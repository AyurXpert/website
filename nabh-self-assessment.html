<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NABH Self-Assessment — AyurXpert</title>
<link rel="icon" href="assets/icon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green-deep:#1a4a2e;--green-mid:#2d7a4f;--green-light:#e8f5ee;
  --gold:#c9902a;--gold-light:#fdf3e2;--cream:#faf8f3;
  --text-dark:#1c2b1f;--text-mid:#4a6352;--text-muted:#8a9e90;
  --border:#d4e6da;--white:#fff;
  --red:#c0392b;--red-light:#fdf0f0;--red-border:#f5c6c6;
  --amber:#e07b00;--amber-light:#fff8e1;
  --radius:10px;--shadow:0 2px 12px rgba(0,0,0,.08)
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh}
.page{max-width:1100px;margin:0 auto;padding:24px 16px 80px}
h1{font-family:'Cormorant Garamond',serif;font-size:26px;color:var(--green-deep);margin-bottom:4px}
.subtitle{font-size:13px;color:var(--text-muted);margin-bottom:20px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.toolbar input,.toolbar select{height:36px;border:1.5px solid var(--border);border-radius:7px;padding:0 10px;font-size:13px;font-family:inherit;background:var(--white)}
.btn{padding:8px 18px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s}
.btn:hover{opacity:.88}.btn-primary{background:var(--green-deep);color:#fff}
.btn-outline{background:transparent;border:1.5px solid var(--green-mid);color:var(--green-mid)}
.btn-sm{padding:5px 12px;font-size:12px}.btn-amber{background:var(--amber);color:#fff}
/* Overall compliance card */
.compliance-card{background:var(--white);border:2px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:20px;box-shadow:var(--shadow);display:flex;gap:24px;align-items:center;flex-wrap:wrap}
.comp-circle{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:4px solid var(--green-mid);font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--green-deep)}
.comp-circle.warn{border-color:var(--amber);color:var(--amber)}
.comp-circle.danger{border-color:var(--red);color:var(--red)}
.comp-details{flex:1}
.comp-title{font-size:16px;font-weight:600;color:var(--green-deep);margin-bottom:4px}
.comp-sub{font-size:12px;color:var(--text-muted)}
.prog-bar{height:8px;background:#e8f5ee;border-radius:4px;margin-top:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:var(--green-mid);transition:width .4s}
.prog-fill.warn{background:var(--amber)}
.prog-fill.danger{background:var(--red)}
/* Chapter section */
.chapter{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:0;margin-bottom:12px;box-shadow:var(--shadow);overflow:hidden}
.chapter-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#f5faf7;cursor:pointer;border-bottom:1px solid var(--border)}
.chapter-hdr:hover{background:#e8f5ee}
.ch-title{font-size:14px;font-weight:600;color:var(--green-deep);display:flex;align-items:center;gap:8px}
.ch-code{font-size:11px;font-weight:700;background:var(--green-deep);color:#fff;padding:2px 7px;border-radius:10px}
.ch-score{font-size:12px;color:var(--text-muted)}
.ch-prog{width:120px;height:6px;background:#d4e6da;border-radius:3px;overflow:hidden}
.ch-fill{height:100%;background:var(--green-mid);border-radius:3px;transition:width .3s}
.chapter-body{display:none;padding:4px 0}
.chapter-body.open{display:block}
/* Standard row */
.std-row{display:flex;align-items:flex-start;gap:12px;padding:10px 16px;border-bottom:1px solid #f0f7f2}
.std-row:last-child{border-bottom:none}
.std-row:hover{background:#fbfdfb}
.std-left{flex:1}
.std-code{font-size:11px;font-weight:700;color:var(--green-mid);margin-bottom:2px;display:flex;align-items:center;gap:6px}
.core-badge{background:var(--red-light);color:var(--red);border:1px solid var(--red-border);padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700}
.std-title{font-size:13px;font-weight:500;color:var(--text-dark);margin-bottom:2px}
.std-desc{font-size:11px;color:var(--text-muted);line-height:1.5}
.std-link{font-size:10px;color:var(--green-mid);text-decoration:none}
.std-link:hover{text-decoration:underline}
.std-score{display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:160px}
.score-label{font-size:10px;color:var(--text-muted)}
.score-select{border:1.5px solid var(--border);border-radius:6px;padding:5px 8px;font-size:12px;font-family:inherit;background:var(--white);cursor:pointer;min-width:150px}
.score-select.s-0{border-color:var(--red);background:var(--red-light)}
.score-select.s-1{border-color:var(--amber);background:var(--amber-light)}
.score-select.s-2{border-color:#f0c040;background:#fffde7}
.score-select.s-3{border-color:var(--green-mid);background:#e8f5ee}
.score-select.s-4{border-color:var(--green-deep);background:#d0eedd}
/* Action plan */
.action-section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:var(--shadow)}
.action-section h3{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--green-deep);margin-bottom:12px}
.action-list{margin-top:8px}
.action-item{padding:8px 12px;margin-bottom:6px;border-radius:6px;background:var(--red-light);border-left:3px solid var(--red);font-size:12px;color:var(--text-dark)}
.action-item.warn{background:var(--amber-light);border-color:var(--amber)}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;color:#fff;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}.toast.success{background:#2d7a4f}.toast.error{background:var(--red)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto}
.modal-bg.show{display:flex}
.modal{background:var(--white);border-radius:12px;padding:28px;width:520px;max-width:100%;margin:auto}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:20px;color:var(--green-deep);margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--text-mid);margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;font-size:13px;font-family:inherit}
.modal-actions{display:flex;gap:8px;margin-top:16px;justify-content:flex-end}
@media print{.toolbar,.btn,.chapter-hdr{display:none!important}.chapter-body{display:block!important}}
</style>
</head>
<body>
<div id="navbar-container"></div>
<div class="page">
  <h1>✅ NABH Self-Assessment Checklist</h1>
  <p class="subtitle">Score each standard (0–4) to calculate chapter-wise and overall compliance. CORE elements highlighted in red.</p>

  <div class="toolbar">
    <select id="sel-type" onchange="switchType()">
      <option value="atwc">ATWC / Ayush (46 Standards)</option>
      <option value="hospital">Hospital — Additional Standards</option>
    </select>
    <input id="sel-assessor" type="text" placeholder="Assessor name" style="width:200px"/>
    <input id="sel-date" type="date"/>
    <button class="btn btn-primary" onclick="saveAssessment()">💾 Save Assessment</button>
    <button class="btn btn-outline" onclick="loadHistory()">📂 Load Previous</button>
    <button class="btn btn-outline" onclick="window.print()">🖨 Print</button>
    <button class="btn btn-amber" onclick="generateActionPlan()">📋 Action Plan</button>
  </div>

  <!-- Overall compliance -->
  <div class="compliance-card" id="overall-card">
    <div class="comp-circle" id="overall-pct">—%</div>
    <div class="comp-details">
      <div class="comp-title" id="overall-title">Score your standards to see compliance</div>
      <div class="comp-sub" id="overall-sub">0 of 0 standards scored &nbsp;·&nbsp; 0 CORE standards compliant</div>
      <div class="prog-bar"><div class="prog-fill" id="overall-bar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- Standards -->
  <div id="standards-container"></div>

  <!-- Action Plan -->
  <div class="action-section" id="action-section" style="display:none">
    <h3>📋 Action Plan — Gaps (Score &lt; 3)</h3>
    <div id="action-list" class="action-list"></div>
  </div>
</div>

<!-- History Modal -->
<div class="modal-bg" id="hist-modal">
  <div class="modal">
    <h2>Previous Assessments</h2>
    <div id="hist-list" style="max-height:300px;overflow-y:auto;font-size:13px"></div>
    <div class="modal-actions">
      <button class="btn btn-outline" onclick="closeModal('hist-modal')">Close</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

let _currentType = 'atwc';

function getStandards() {
  return STANDARDS.filter(s => s.types.includes(_currentType));
}

function render() {
  _currentType = document.getElementById('sel-type').value;
  const stds = getStandards();

  // Group by chapter
  const chapters = {};
  for (const s of stds) {
    if (!chapters[s.ch]) chapters[s.ch] = {chName:s.chName, items:[]};
    chapters[s.ch].items.push(s);
  }

  const container = document.getElementById('standards-container');
  container.innerHTML = Object.entries(chapters).map(([ch, {chName, items}])=> {
    const chScore = items.reduce((a,s)=>a+(_scores[s.code]||0),0);
    const chMax = items.length * 4;
    const chPct = chMax ? Math.round(chScore/chMax*100) : 0;
    return `<div class="chapter" id="ch-${ch}">
      <div class="chapter-hdr" onclick="toggleChapter('${ch}')">
        <div class="ch-title">
          <span class="ch-code">${ch}</span>
          ${chName}
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <span class="ch-score">${chScore}/${chMax} (${chPct}%)</span>
          <div class="ch-prog"><div class="ch-fill" id="chfill-${ch}" style="width:${chPct}%"></div></div>
        </div>
      </div>
      <div class="chapter-body" id="chbody-${ch}">
        ${items.map(s => renderStd(s)).join('')}
      </div>
    </div>`;
  }).join('');
  updateOverall();
}

function renderStd(s) {
  const score = _scores[s.code] !== undefined ? _scores[s.code] : '';
  const scls = score !== '' ? 's-'+score : '';
  return `<div class="std-row" id="std-${s.code}">
    <div class="std-left">
      <div class="std-code">${s.code} ${s.core?'<span class="core-badge">CORE</span>':''}</div>
      <div class="std-title">${s.title.replace(' (CORE)','').replace(' (CORE ATWC)','')}</div>
      <div class="std-desc">${s.desc}</div>
      <a class="std-link" href="${s.file}" target="_blank">→ Open ${s.file}</a>
    </div>
    <div class="std-score">
      <span class="score-label">Score (0–4)</span>
      <select class="score-select ${scls}" id="sc-${s.code}" onchange="onScore('${s.code}',this)">
        <option value="">— Not scored —</option>
        ${SCORE_OPTIONS.map(o=>`<option value="${o.v}" ${score===o.v?'selected':''}>${o.label}</option>`).join('')}
      </select>
    </div>
  </div>`;
}

window.onScore = (code, sel) => {
  const v = sel.value !== '' ? parseInt(sel.value) : undefined;
  if (v !== undefined) _scores[code] = v;
  else delete _scores[code];
  sel.className = 'score-select' + (v !== undefined ? ' s-'+v : '');
  updateOverall();
  updateChapter(STANDARDS.find(s=>s.code===code)?.ch);
};

function updateChapter(ch) {
  if (!ch) return;
  const items = getStandards().filter(s=>s.ch===ch);
  const chScore = items.reduce((a,s)=>a+(_scores[s.code]||0),0);
  const chMax = items.length*4;
  const chPct = chMax ? Math.round(chScore/chMax*100) : 0;
  const fill = document.getElementById('chfill-'+ch);
  if (fill) fill.style.width = chPct+'%';
  const chEl = document.querySelector(`#ch-${ch} .ch-score`);
  if (chEl) chEl.textContent = `${chScore}/${chMax} (${chPct}%)`;
}

function updateOverall() {
  const stds = getStandards();
  const scored = stds.filter(s=>_scores[s.code]!==undefined);
  const total = scored.reduce((a,s)=>a+_scores[s.code],0);
  const max = stds.length * 4;
  const pct = max ? Math.round(total/max*100) : 0;
  const coreStds = stds.filter(s=>s.core);
  const coreDone = coreStds.filter(s=>(_scores[s.code]||0)>=3).length;

  const circle = document.getElementById('overall-pct');
  const bar = document.getElementById('overall-bar');
  circle.textContent = pct+'%';
  bar.style.width = pct+'%';

  const cls = pct >= 75 ? '' : pct >= 50 ? 'warn' : 'danger';
  circle.className = 'comp-circle '+cls;
  bar.className = 'prog-fill '+cls;

  document.getElementById('overall-title').textContent = pct >= 75 ? '✅ Ready for NABH assessment' : pct >= 50 ? '⚠ Partial compliance — close gaps before applying' : '❌ Significant gaps — prioritise CORE elements first';
  document.getElementById('overall-sub').textContent = `${scored.length} of ${stds.length} standards scored · ${coreDone}/${coreStds.length} CORE standards ≥75% · Total ${total}/${max}`;
}

window.toggleChapter = (ch) => {
  const body = document.getElementById('chbody-'+ch);
  body.classList.toggle('open');
};

window.switchType = () => render();

window.generateActionPlan = () => {
  const stds = getStandards();
  const gaps = stds.filter(s => (_scores[s.code]||0) < 3);
  if (!gaps.length) {
    showToast('All standards scored ≥3. No gaps identified!','success');
    document.getElementById('action-section').style.display='none';
    return;
  }
  const list = document.getElementById('action-list');
  list.innerHTML = gaps.map(s => {
    const score = _scores[s.code] !== undefined ? _scores[s.code] : 'Not scored';
    const cls = (_scores[s.code]||0) === 0 ? '' : 'warn';
    return `<div class="action-item ${cls}">
      <strong>${s.code}${s.core?' ★ CORE':''}</strong> — ${s.title.replace(' (CORE)','').replace(' (CORE ATWC)','')} &nbsp;·&nbsp; Score: ${score}/4<br/>
      <span style="font-size:11px;color:var(--text-muted)">${s.desc}</span><br/>
      <a href="${s.file}" style="font-size:11px;color:var(--green-mid)">→ ${s.file}</a>
    </div>`;
  }).join('');
  document.getElementById('action-section').style.display='block';
  document.getElementById('action-section').scrollIntoView({behavior:'smooth'});
};

window.saveAssessment = async () => {
  const assessor = document.getElementById('sel-assessor').value.trim();
  const date = document.getElementById('sel-date').value;
  if (!assessor||!date){showToast('Enter assessor name and date','error');return;}
  const stds = getStandards();
  const scored = stds.filter(s=>_scores[s.code]!==undefined);
  const total = scored.reduce((a,s)=>a+_scores[s.code],0);
  const max = stds.length*4;
  const pct = max ? parseFloat((total/max*100).toFixed(2)) : 0;
  const {error} = await supabase.from('nabh_self_assessments').insert({
    tenant_id:tenantId,
    assessment_type:_currentType,
    assessment_date:date,
    assessor_name:assessor,
    scores:_scores,
    total_standards:stds.length,
    total_score:total,
    max_score:max,
    compliance_percent:pct,
    submitted_by:profile.id
  });
  if (error){showToast('Error: '+error.message,'error');return;}
  showToast('Assessment saved — '+pct+'% compliance','success');
};

window.loadHistory = async () => {
  const {data} = await supabase.from('nabh_self_assessments').select('id,assessment_date,assessor_name,compliance_percent,assessment_type,total_standards').eq('tenant_id',tenantId).order('assessment_date',{ascending:false}).limit(20);
  const list = document.getElementById('hist-list');
  if (!data?.length){list.innerHTML='<div style="text-align:center;padding:20px;color:var(--text-muted)">No saved assessments.</div>';document.getElementById('hist-modal').classList.add('show');return;}
  list.innerHTML = data.map(a=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-weight:500">${a.assessment_date} — ${a.assessor_name}</div>
        <div style="font-size:11px;color:var(--text-muted)">${a.assessment_type.toUpperCase()} · ${a.total_standards} standards · ${a.compliance_percent}%</div>
      </div>
      <button class="btn btn-sm btn-outline" onclick="loadAssessment('${a.id}')">Load</button>
    </div>`).join('');
  document.getElementById('hist-modal').classList.add('show');
};

window.loadAssessment = async (id) => {
  const {data} = await supabase.from('nabh_self_assessments').select('*').eq('id',id).single();
  if (!data){showToast('Could not load','error');return;}
  document.getElementById('sel-type').value = data.assessment_type;
  document.getElementById('sel-assessor').value = data.assessor_name;
  document.getElementById('sel-date').value = data.assessment_date;
  _currentType = data.assessment_type;
  _scores = data.scores||{};
  render();
  closeModal('hist-modal');
  showToast('Assessment loaded — '+data.compliance_percent+'% compliance','success');
};

window.closeModal = id => document.getElementById(id).classList.remove('show');

function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className=`toast ${type} show`;setTimeout(()=>t.classList.remove('show'),3000);}

// Expand first chapter by default
render();
const firstChBody = document.querySelector('.chapter-body');
if (firstChBody) firstChBody.classList.add('open');
</script>
</body>
</html>
