<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Prescription — AyurXpert</title>
<link rel="icon" href="assets/icon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green-deep:#1a4a2e;--green-mid:#2d7a4f;--green-light:#e8f5ee;
  --gold:#c9902a;--cream:#faf8f3;--white:#fff;
  --text-dark:#1c2b1f;--text-mid:#4a6352;--text-muted:#8a9e90;
  --border:#d4e6da;
}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark);padding:32px 16px;min-height:100vh}

.page-wrap{max-width:680px;margin:0 auto}

/* Print button — screen only */
.print-btn{
  display:flex;align-items:center;gap:8px;margin-bottom:20px;
  padding:10px 20px;background:var(--green-deep);color:#fff;border:none;
  border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;
  font-weight:500;cursor:pointer;transition:background .2s
}
.print-btn:hover{background:#1f5c37}

/* Prescription card */
.rx-card{
  background:var(--white);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;box-shadow:0 2px 16px rgba(0,0,0,.07)
}

/* Clinic header */
.rx-header{
  padding:20px 24px 16px;border-bottom:2px solid var(--green-deep);
  display:flex;justify-content:space-between;align-items:flex-start;gap:16px
}
.clinic-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--green-deep)}
.clinic-type{font-size:12px;color:var(--text-muted);margin-top:2px}
.clinic-address{font-size:12px;color:var(--text-mid);margin-top:4px;line-height:1.5}
.doctor-block{text-align:right;flex-shrink:0}
.doctor-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:600;color:var(--green-deep)}
.doctor-qual{font-size:12px;color:var(--text-muted);margin-top:2px}
.reg-num{font-size:11px;color:var(--text-muted);margin-top:2px}

/* Patient info strip */
.pt-strip{
  padding:12px 24px;background:var(--cream);
  border-bottom:1px solid var(--border);
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px
}
.pt-field label{display:block;font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.pt-field span{font-size:13px;font-weight:500;color:var(--text-dark)}

/* Diagnosis box */
.diag-box{
  padding:12px 24px;border-bottom:1px solid var(--border);
  background:#f8fcfa;display:flex;gap:24px;flex-wrap:wrap
}
.diag-item label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:3px}
.diag-item span{font-size:13px;font-weight:500;color:var(--green-deep)}

/* Rx symbol + medicines */
.rx-body{padding:20px 24px}
.rx-symbol{
  font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;
  color:var(--green-deep);margin-bottom:12px;
  display:flex;align-items:center;gap:8px
}
.rx-symbol::after{content:'';flex:1;height:1px;background:var(--border)}

.med-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:4px}
.med-table th{
  text-align:left;padding:6px 8px;font-size:10px;font-weight:600;
  color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;
  border-bottom:1px solid var(--border)
}
.med-table td{padding:8px;border-bottom:1px solid var(--border);vertical-align:top}
.med-table tr:last-child td{border-bottom:none}
.med-num{color:var(--text-muted);font-size:12px;width:24px}
.med-name{font-weight:500;color:var(--text-dark)}
.med-anupana{font-size:11px;color:var(--text-muted);margin-top:2px}
.med-dose{color:var(--text-mid)}
.med-freq{
  display:inline-block;padding:1px 8px;border-radius:12px;
  background:var(--green-light);color:var(--green-deep);
  font-size:11px;font-weight:600
}

/* Advice */
.advice-box{
  padding:14px 24px;border-top:1px solid var(--border);background:var(--cream);
  display:grid;grid-template-columns:1fr 1fr;gap:16px
}
.advice-col label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:6px}
.advice-col p{font-size:12px;color:var(--text-mid);line-height:1.6;white-space:pre-wrap}

/* Follow-up + signature */
.rx-footer{
  padding:16px 24px 20px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:flex-end
}
.followup-block{}
.followup-block label{font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;display:block;margin-bottom:4px}
.followup-block span{font-size:13px;font-weight:500;color:var(--text-dark)}
.followup-note{font-size:11px;color:var(--text-muted);margin-top:3px}
.sig-block{text-align:right}
.sig-line{border-top:1px solid var(--text-muted);width:160px;padding-top:6px;font-size:12px;color:var(--text-mid);margin-top:24px}

/* Powered by footer */
.rx-powered{
  text-align:center;padding:8px;border-top:1px solid var(--border);
  font-size:10px;color:var(--text-muted)
}

/* Error / loading states */
.state-msg{text-align:center;padding:60px 24px;color:var(--text-muted);font-size:14px}

@media print{
  body{background:#fff;padding:0}
  .print-btn{display:none}
  .rx-card{box-shadow:none;border:none;border-radius:0}
  .page-wrap{max-width:100%}
}
</style>
</head>
<body>

<div class="page-wrap">
  <button class="print-btn" onclick="window.print()">🖨 Print Prescription</button>

  <div class="rx-card" id="rx-card">
    <div class="state-msg" id="state-msg">Loading prescription…</div>
  </div>
</div>

<script type="module">
import { supabase } from './js/core/db/supabaseClient.js';

const params  = new URLSearchParams(window.location.search);
const visitId = params.get('visitId');

if (!visitId) {
  document.getElementById('state-msg').textContent = 'No visit ID provided.';
  throw new Error('No visitId');
}

// Read tenant from sessionStorage (set by auth.js on login)
const tenant = JSON.parse(sessionStorage.getItem('ayurxpert_tenant') || '{}');

async function load() {
  // 1. Visit + patient
  const { data: visit } = await supabase
    .from('visits')
    .select('id, token_number, chief_complaint, created_at, doctor_id, patients(id, name, phone, abha_number)')
    .eq('id', visitId)
    .single();

  if (!visit) {
    document.getElementById('state-msg').textContent = 'Visit not found.';
    return;
  }

  // 2. Doctor profile
  let doctorName = '—', doctorQual = '', doctorReg = '';
  if (visit.doctor_id) {
    const { data: doc } = await supabase
      .from('profiles')
      .select('full_name, qualification, registration_number')
      .eq('id', visit.doctor_id)
      .single();
    doctorName = doc?.full_name || '—';
    doctorQual = doc?.qualification || '';
    doctorReg  = doc?.registration_number || '';
  }

  // 3. Consultation notes (diagnosis, advice, follow-up)
  const { data: notesRows } = await supabase
    .from('consultation_notes')
    .select('modern_diagnosis, ayurveda_diagnosis, pathya, apathya, followup_date, followup_notes, rx_instructions')
    .eq('visit_id', visitId)
    .order('created_at', { ascending: false })
    .limit(1);
  const notes = notesRows?.[0] || {};

  // 4. Prescription
  const { data: presc } = await supabase
    .from('prescriptions')
    .select('id')
    .eq('visit_id', visitId)
    .maybeSingle();

  // 5. Prescription items
  let items = [];
  if (presc) {
    const { data: rows } = await supabase
      .from('prescription_items')
      .select('medicine_name, dosage, frequency, duration, anupana, quantity')
      .eq('prescription_id', presc.id);
    items = rows || [];
  }

  render(visit, doctorName, doctorQual, doctorReg, notes, items);
}

function _uhid(uuid) {
  return `AYX-${new Date().getFullYear()}-${(uuid||'').replace(/-/g,'').slice(-6).toUpperCase()}`;
}

function render(visit, doctorName, doctorQual, doctorReg, notes, items) {
  const patient = visit.patients;
  const date    = new Date(visit.created_at).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'numeric'});
  const hasDiag = notes.modern_diagnosis || notes.ayurveda_diagnosis;
  const hasAdvice = notes.pathya || notes.apathya;

  document.getElementById('rx-card').innerHTML = `

    <!-- Clinic header -->
    <div class="rx-header">
      <div>
        <div class="clinic-name">${tenant.name || 'AyurXpert Clinic'}</div>
        <div class="clinic-type">${_tenantTypeLabel(tenant.type)}</div>
        <div class="clinic-address">${[tenant.address, tenant.city, tenant.state].filter(Boolean).join(', ') || ''}</div>
      </div>
      <div class="doctor-block">
        <div class="doctor-name">${doctorName}</div>
        ${doctorQual ? `<div class="doctor-qual">${doctorQual}</div>` : ''}
        ${doctorReg  ? `<div class="reg-num">Reg. No: ${doctorReg}</div>` : ''}
      </div>
    </div>

    <!-- Patient info -->
    <div class="pt-strip">
      <div class="pt-field">
        <label>Patient</label>
        <span>${patient?.name || '—'}</span>
      </div>
      <div class="pt-field">
        <label>UHID</label>
        <span>${_uhid(patient?.id)}</span>
      </div>
      <div class="pt-field">
        <label>Date</label>
        <span>${date}</span>
      </div>
      <div class="pt-field">
        <label>Token</label>
        <span>#${visit.token_number}</span>
      </div>
      <div class="pt-field">
        <label>Phone</label>
        <span>${patient?.phone || '—'}</span>
      </div>
      ${patient?.abha_number ? `<div class="pt-field"><label>ABHA</label><span>${patient.abha_number}</span></div>` : ''}
    </div>

    <!-- Diagnosis -->
    ${hasDiag ? `
    <div class="diag-box">
      ${notes.modern_diagnosis ? `<div class="diag-item"><label>Diagnosis</label><span>${notes.modern_diagnosis}</span></div>` : ''}
      ${notes.ayurveda_diagnosis ? `<div class="diag-item"><label>Ayurveda Diagnosis</label><span>${notes.ayurveda_diagnosis}</span></div>` : ''}
    </div>` : ''}

    <!-- Medicines -->
    <div class="rx-body">
      <div class="rx-symbol">&#8478;</div>
      ${items.length ? `
      <table class="med-table">
        <thead>
          <tr>
            <th style="width:24px">#</th>
            <th>Medicine</th>
            <th>Dosage</th>
            <th>Frequency</th>
            <th>Duration</th>
          </tr>
        </thead>
        <tbody>
          ${items.map((item, i) => `
            <tr>
              <td class="med-num">${i+1}.</td>
              <td>
                <div class="med-name">${item.medicine_name || '—'}</div>
                ${item.anupana ? `<div class="med-anupana">with ${item.anupana}</div>` : ''}
              </td>
              <td class="med-dose">${item.dosage || '—'}</td>
              <td><span class="med-freq">${item.frequency || '—'}</span></td>
              <td class="med-dose">${item.duration || '—'}</td>
            </tr>`).join('')}
        </tbody>
      </table>
      ${notes.rx_instructions ? `<div style="margin-top:10px;font-size:12px;color:var(--text-mid);padding:8px 10px;background:var(--cream);border-radius:6px;border-left:3px solid var(--green-mid)">${notes.rx_instructions}</div>` : ''}
      ` : '<div style="color:var(--text-muted);font-size:13px;padding:8px 0">No medicines prescribed.</div>'}
    </div>

    <!-- Advice -->
    ${hasAdvice ? `
    <div class="advice-box">
      ${notes.pathya ? `<div class="advice-col"><label>Pathya (Follow)</label><p>${notes.pathya}</p></div>` : ''}
      ${notes.apathya ? `<div class="advice-col"><label>Apathya (Avoid)</label><p>${notes.apathya}</p></div>` : ''}
    </div>` : ''}

    <!-- Follow-up + signature -->
    <div class="rx-footer">
      <div class="followup-block">
        ${notes.followup_date ? `
          <label>Review Date</label>
          <span>${new Date(notes.followup_date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})}</span>
          ${notes.followup_notes ? `<div class="followup-note">${notes.followup_notes}</div>` : ''}
        ` : `<div style="font-size:12px;color:var(--text-muted)">Review date: _______________</div>`}
      </div>
      <div class="sig-block">
        <div class="sig-line">${doctorName}<br><span style="font-size:11px;color:var(--text-muted)">Signature &amp; Stamp</span></div>
      </div>
    </div>

    <div class="rx-powered">Powered by AyurXpert HMS · ayurxpert.com</div>
  `;
}

function _tenantTypeLabel(type) {
  const map = { clinic:'Ayurveda Clinic', hospital:'Ayurveda Hospital', pk_center:'Panchakarma Centre', dispensary:'Dispensary', college:'Ayurveda College', pharma:'Pharmacy', wellness:'Wellness Centre' };
  return map[type] || 'Healthcare Centre';
}

load();
</script>
</body>
</html>
