<!DOCTYPE html>
<html>
<head>
  <title>Invoice - AyurXpert</title>
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cloudflareinsights.com https://static.cloudflareinsights.com; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-white p-6">

<div id="invoice" class="max-w-2xl mx-auto border p-6">

  <!-- HEADER -->
  <div class="flex justify-between items-center mb-4">
    <div>
      <h1 id="clinicName" class="text-xl font-bold">AyurXpert HMS</h1>
      <p class="text-sm text-gray-600">Invoice</p>
    </div>
    <img src="assets/logo.jpeg" class="h-12" id="clinic-logo" />
  </div>

  <hr class="my-4">

  <!-- PATIENT -->
  <div id="patientInfo" class="mb-4"></div>

  <div class="mb-4 text-sm">
    <div><b>Date:</b> <span id="invoiceDate"></span></div>
    <div id="refLine"></div>
  </div>

  <!-- MEDICINES -->
  <table class="w-full border text-sm">
    <thead class="bg-gray-100">
      <tr>
        <th class="p-2 border">Medicine</th>
        <th class="p-2 border">Qty</th>
        <th class="p-2 border">Price</th>
        <th class="p-2 border">GST</th>
        <th class="p-2 border">Total</th>
      </tr>
    </thead>
    <tbody id="medTable"></tbody>
  </table>

  <!-- TOTAL -->
  <div class="text-right mt-4">
    <div class="text-lg font-bold border-t pt-2" id="totalAmount"></div>
  </div>

  <!-- FOOTER -->
  <div class="mt-6 text-center text-sm text-gray-500">
    Thank you for visiting 🙏
  </div>
  <div id="feedback-footer" class="mt-4 border-t pt-4 text-center" style="display:none">
    <div class="text-xs text-gray-500 mb-1">Share your experience — it takes 1 minute</div>
    <div id="feedback-url" class="text-xs font-mono text-green-700 break-all"></div>
  </div>

</div>

<div class="text-center mt-4">
  <button data-onclick="print" class="bg-green-600 text-white px-4 py-2 rounded">
    Print / Save PDF
  </button>
</div>

<script type="module" src="js/pages/printInvoice.js"></script>
</body>
</html>
