<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Department Modules — AyurXpert</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://cdn.jsdelivr.net https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cloudflareinsights.com https://static.cloudflareinsights.com; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"/>
<meta http-equiv="X-Content-Type-Options" content="nosniff"/>
<link rel="icon" href="assets/icon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"/>
<style>
:root{
  --green-deep:#1a4a2e;--green-mid:#2d7a4f;--green-light:#e8f5ee;
  --gold:#c9902a;--gold-light:#fdf6e3;
  --cream:#faf8f3;--white:#fff;
  --border:#d8e4dd;--radius:10px;
  --text-dark:#1a2e22;--text-mid:#3d5a47;--text-muted:#7a9485;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh}
.page-wrap{max-width:1200px;margin:0 auto;padding:28px 20px 80px}

/* Header */
.page-header{margin-bottom:28px}
.page-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--green-deep)}
.page-subtitle{font-size:13px;color:var(--text-muted);margin-top:4px}

/* Department grid */
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:20px}

/* Department card */
.dept-card{
  background:var(--white);border:1.5px solid var(--border);
  border-radius:var(--radius);overflow:hidden;
  transition:box-shadow .2s,border-color .2s;
}
.dept-card:hover{box-shadow:0 4px 20px rgba(26,74,46,.1);border-color:#b2d8bf}
.dept-card-hdr{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;cursor:pointer;
  border-bottom:1.5px solid var(--border);
  background:var(--green-light);
  user-select:none;
}
.dept-card-hdr:hover{background:#ddf0e6}
.dept-icon{font-size:26px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;background:var(--white);border-radius:10px;flex-shrink:0;box-shadow:0 1px 4px rgba(26,74,46,.1)}
.dept-name{font-weight:700;font-size:15px;color:var(--green-deep);line-height:1.2}
.dept-code{font-size:11px;color:var(--text-muted);margin-top:2px;letter-spacing:.3px}
.dept-chevron{margin-left:auto;font-size:14px;color:var(--text-muted);transition:transform .2s;flex-shrink:0}
.dept-card.open .dept-chevron{transform:rotate(180deg)}
.dept-card.open .dept-card-hdr{border-bottom:1.5px solid var(--border)}

/* Module list */
.dept-modules{display:none;padding:8px 0}
.dept-card.open .dept-modules{display:block}
.module-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;cursor:pointer;
  transition:background .15s;
  text-decoration:none;color:inherit;
}
.module-item:hover{background:#f5faf7}
.module-item.disabled{opacity:.45;cursor:default;pointer-events:none}
.module-icon{font-size:18px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;background:var(--green-light);border-radius:8px;flex-shrink:0}
.module-item.disabled .module-icon{background:#f1f5f4}
.module-info{flex:1}
.module-name{font-size:13px;font-weight:600;color:var(--text-dark)}
.module-desc{font-size:11px;color:var(--text-muted);margin-top:1px}
.module-badges{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;letter-spacing:.3px;text-transform:uppercase}
.badge-ncism{background:var(--gold);color:#fff}
.badge-page{background:var(--green-light);color:var(--green-deep);border:1px solid #b2d8bf}
.badge-consult{background:#e3f0ff;color:#1a4080;border:1px solid #b0c8f0}
.badge-soon{background:#f1f5f4;color:var(--text-muted);border:1px solid var(--border)}
.module-arrow{font-size:14px;color:var(--text-muted);flex-shrink:0}
.module-item:not(.disabled):hover .module-arrow{color:var(--green-mid)}
.module-divider{height:1px;background:var(--border);margin:4px 16px}

/* Search */
.search-bar{margin-bottom:20px}
.search-input{width:100%;max-width:400px;height:42px;border:1.5px solid var(--border);border-radius:var(--radius);padding:0 14px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--white)}
.search-input:focus{outline:none;border-color:var(--green-mid)}

@media(max-width:600px){
  .dept-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="page-wrap">
  <div class="page-header">
    <div class="page-title">Department Modules</div>
    <div class="page-subtitle">Clinical features organised by NCISM department — click a department to expand</div>
  </div>

  <div class="search-bar">
    <input class="search-input" id="dept-search" type="text" placeholder="Search module or department…" data-oninput="filterDepts"/>
  </div>

  <div class="dept-grid" id="dept-grid"></div>
</div>

<script type="module" src="js/pages/dept-hub.js"></script>
</body>
</html>
