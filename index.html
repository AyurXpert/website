<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Dashboard — AyurXpert</title>
<link rel="icon" href="assets/icon.svg"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="assets/icon.svg"/>
<meta name="theme-color" content="#1a4a2e"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="AyurXpert"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green-deep:#1a4a2e;--green-mid:#2d7a4f;--green-light:#e8f5ee;
  --gold:#c9902a;--gold-light:#fdf3e2;
  --cream:#faf8f3;--white:#ffffff;
  --text-dark:#1c2b1f;--text-mid:#4a6352;--text-muted:#8a9e90;
  --border:#d4e6da;
  --error:#dc2626;--error-bg:#fff3f3;
  --warning:#d97706;--warning-bg:#fffbf0;
  --radius:14px;--shadow:0 2px 14px rgba(0,0,0,0.07);
}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark)}

/* ── Layout ── */
.dashboard{max-width:1280px;margin:0 auto;padding:28px 20px 80px}

/* ── Welcome banner ── */
.welcome-banner{
  background:var(--green-deep);border-radius:var(--radius);
  padding:26px 28px;margin-bottom:24px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  position:relative;overflow:hidden;
}
.welcome-banner::before{
  content:'';position:absolute;top:-60px;right:-60px;
  width:220px;height:220px;border-radius:50%;
  background:rgba(201,144,42,0.08);
}
.welcome-banner::after{
  content:'';position:absolute;bottom:-40px;left:-40px;
  width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,0.04);
}
.welcome-left{position:relative;z-index:1}
.welcome-greeting{
  font-family:'Cormorant Garamond',serif;
  font-size:26px;font-weight:600;color:#fff;margin-bottom:4px;line-height:1.2;
}
.welcome-date{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:8px}
.role-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(201,144,42,0.2);border:1px solid rgba(201,144,42,0.35);
  color:#e8b84b;font-size:12px;font-weight:500;
  padding:4px 12px;border-radius:20px;
}
.welcome-right{position:relative;z-index:1;flex-shrink:0}
.btn-primary-action{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);
  color:#fff;border-radius:10px;padding:10px 18px;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  text-decoration:none;cursor:pointer;transition:background .2s;
}
.btn-primary-action:hover{background:rgba(255,255,255,0.22)}

/* ── Tenant code block (admin banner) ── */
.code-block{
  background:rgba(0,0,0,0.22);border:1px solid rgba(255,255,255,0.12);
  border-radius:12px;padding:14px 18px;text-align:center;min-width:190px;
}
.code-label{font-size:10px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.code-value{
  font-size:24px;font-weight:700;color:#e8b84b;
  letter-spacing:4px;margin-bottom:10px;word-break:break-all;
}
.code-copy{
  background:rgba(255,255,255,0.1);color:#fff;
  border:1px solid rgba(255,255,255,0.18);border-radius:8px;
  padding:6px 16px;font-family:'DM Sans',sans-serif;font-size:12px;
  cursor:pointer;transition:background .2s;width:100%;
}
.code-copy:hover{background:rgba(255,255,255,0.2)}
.code-hint{font-size:10px;color:rgba(255,255,255,0.3);margin-top:7px;line-height:1.4}

/* ── Section heading ── */
.section{margin-bottom:24px}
.section-title{font-size:12px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}

/* ── Stats grid ── */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{
  background:var(--white);border-radius:var(--radius);padding:18px 20px;
  box-shadow:var(--shadow);display:flex;flex-direction:column;gap:8px;
}
.stat-header{display:flex;align-items:flex-start;justify-content:space-between}
.stat-icon{
  width:38px;height:38px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;font-size:18px;
}
.stat-icon.green{background:var(--green-light)}
.stat-icon.gold{background:var(--gold-light)}
.stat-icon.blue{background:#eff6ff}
.stat-icon.red{background:#fff1f2}
.stat-number{
  font-family:'Cormorant Garamond',serif;
  font-size:34px;font-weight:600;color:var(--text-dark);line-height:1;
}
.stat-number.loading{color:var(--border)}
.stat-label{font-size:12px;color:var(--text-muted);font-weight:400}
.stat-sub{font-size:11px;color:var(--text-muted);margin-top:2px}

/* ── Quick actions ── */
.actions-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.action-card{
  background:var(--white);border:1.5px solid var(--border);
  border-radius:var(--radius);padding:16px;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  text-align:center;text-decoration:none;color:var(--text-dark);
  transition:border-color .2s,box-shadow .2s,transform .15s;cursor:pointer;
}
.action-card:hover{border-color:var(--green-mid);box-shadow:0 4px 20px rgba(45,122,79,0.12);transform:translateY(-2px)}
.action-icon{font-size:28px;line-height:1}
.action-label{font-size:13px;font-weight:500;color:var(--text-dark)}
.action-desc{font-size:11px;color:var(--text-muted);line-height:1.4}

/* ── Card section ── */
.content-card{
  background:var(--white);border-radius:var(--radius);
  box-shadow:var(--shadow);overflow:hidden;
}
.content-card-header{
  padding:18px 22px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
}
.content-card-title{font-size:15px;font-weight:500;color:var(--text-dark)}
.badge-count{
  background:var(--green-light);color:var(--green-deep);
  font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;
}
.badge-count.red{background:var(--error-bg);color:var(--error)}
.badge-count.gold{background:var(--gold-light);color:var(--gold)}

/* ── Table ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{
  text-align:left;padding:10px 18px;
  font-size:11px;font-weight:500;color:var(--text-muted);
  text-transform:uppercase;letter-spacing:.6px;
  background:#fafafa;border-bottom:1px solid var(--border);
}
td{padding:13px 18px;font-size:14px;border-bottom:1px solid #f0f4f2;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafff8}

/* ── Table role chip ── */
.role-chip{
  display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;
  background:var(--green-light);color:var(--green-deep);
}

/* ── Action buttons in table ── */
.btn-approve{
  background:var(--green-deep);color:#fff;border:none;border-radius:8px;
  padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:13px;
  cursor:pointer;transition:background .2s;margin-right:6px;
}
.btn-approve:hover{background:#1f5c37}
.btn-reject{
  background:#fff;color:var(--error);border:1.5px solid #fca5a5;border-radius:8px;
  padding:7px 14px;font-family:'DM Sans',sans-serif;font-size:13px;
  cursor:pointer;transition:background .2s,color .2s;
}
.btn-reject:hover{background:var(--error-bg)}
.btn-approve:disabled,.btn-reject:disabled{opacity:.5;cursor:not-allowed}

/* ── Empty state ── */
.empty-state{text-align:center;padding:48px 24px}
.empty-icon{font-size:42px;margin-bottom:12px;opacity:.5}
.empty-title{font-size:15px;font-weight:500;color:var(--text-mid);margin-bottom:6px}
.empty-body{font-size:13px;color:var(--text-muted);line-height:1.6}

/* ── Toast ── */
#toast{
  position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(20px);
  background:#1c2b1f;color:#fff;border-radius:10px;
  padding:11px 20px;font-size:14px;opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;z-index:1100;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Responsive ── */
@media(max-width:900px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .actions-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:600px){
  .dashboard{padding:16px 12px 80px}
  .welcome-banner{padding:18px;flex-direction:column;align-items:flex-start}
  .welcome-greeting{font-size:22px}
  .btn-primary-action{width:100%;justify-content:center}
  .code-block{min-width:unset;width:100%}
  .code-value{font-size:20px;letter-spacing:3px}
  .stats-grid{gap:10px}
  .stat-number{font-size:28px}
  .actions-grid{grid-template-columns:repeat(2,1fr)}
}
@media(max-width:400px){
  .stats-grid{grid-template-columns:1fr 1fr}
  .actions-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="dashboard" id="dashboard" style="display:none">

  <!-- Welcome Banner -->
  <div class="welcome-banner">
    <div class="welcome-left">
      <div class="welcome-greeting">Good <span id="time-of-day">morning</span>, <span id="user-name">...</span></div>
      <div class="welcome-date" id="today-date"></div>
      <div class="role-badge"><span id="role-label"></span></div>
    </div>
    <div class="welcome-right" id="banner-action"></div>
  </div>

  <!-- Stats -->
  <div class="section">
    <div class="section-title">Today at a glance</div>
    <div class="stats-grid" id="stats-grid">
      <!-- injected by JS -->
    </div>
  </div>

  <!-- Quick Actions -->
  <div class="section">
    <div class="section-title">Quick actions</div>
    <div class="actions-grid" id="actions-grid">
      <!-- injected by JS -->
    </div>
  </div>

  <!-- Main content section -->
  <div id="main-section"></div>

</div>

<div id="toast"></div>

<script type="module" src="./js/pwa/register-sw.js"></script>
<script type="module">
import { requireAuth, getCurrentProfile, getCurrentTenant, getCurrentTenantId, getCurrentRole,
         getPendingApprovals, logout } from './js/core/auth.js';
import { initNavbar } from './js/components/navbar.js';
import { supabase }   from './js/core/db/supabaseClient.js';

// ── Boot ────────────────────────────────────────────────────────────────────
await requireAuth([], 'home.html');
initNavbar();

const profile  = getCurrentProfile();
const tenant   = getCurrentTenant();
const tenantId = getCurrentTenantId();
const role     = getCurrentRole();

if (!profile) { window.location.href = 'login.html'; }
if (['super_admin','dept_admin'].includes(role)) { window.location.href = 'admin.html'; }

document.getElementById('dashboard').style.display = '';
document.title = `Dashboard — ${tenant?.name || 'AyurXpert'}`;

// ── Greeting ─────────────────────────────────────────────────────────────────
const h = new Date().getHours();
const tod = h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';
document.getElementById('time-of-day').textContent = tod;
document.getElementById('user-name').textContent   = (profile.full_name || 'there').split(' ')[0];
document.getElementById('today-date').textContent  = new Date().toLocaleDateString('en-IN', {
  weekday:'long', day:'numeric', month:'long', year:'numeric'
});
document.getElementById('role-label').textContent  = _roleLabel(role);

// ── Today range helper ────────────────────────────────────────────────────────
const todayStr   = new Date().toISOString().split('T')[0];
const todayStart = todayStr + 'T00:00:00';
const todayEnd   = todayStr + 'T23:59:59';

// ── Role-specific dashboard setup ─────────────────────────────────────────────
if (['super_admin','dept_admin'].includes(role)) {
  await _setupAdmin();
} else if (role === 'doctor') {
  await _setupDoctor();
} else if (['receptionist','nurse'].includes(role)) {
  await _setupReception();
} else if (role === 'pharmacist') {
  await _setupPharmacist();
} else if (role === 'accountant') {
  await _setupAccountant();
} else if (role === 'lab_tech') {
  await _setupLabTech();
} else {
  await _setupDefault();
}

// ════════════════════════════════════════════════════════════════
// ADMIN  (super_admin / dept_admin)
// ════════════════════════════════════════════════════════════════
async function _setupAdmin() {
  // Show tenant code in banner (admins need this to share with staff)
  _setBannerAdmin();

  // Stats — fetch in parallel
  const [pending, staff, visitsToday, revenueToday] = await Promise.all([
    _count('profiles', [['tenant_id', tenantId], ['status','pending_approval']]),
    _count('profiles', [['tenant_id', tenantId], ['status','active']]),
    _countToday('visits'),
    _sumToday('bills', 'amount_paid'),
  ]);

  _renderStats([
    { icon:'⏳', iconClass:'red',   number: pending,    label:'Pending Approvals',  sub:'staff awaiting review' },
    { icon:'👥', iconClass:'green', number: staff,      label:'Active Staff',       sub:'currently onboarded' },
    { icon:'🏥', iconClass:'blue',  number: visitsToday,label:'Patients Today',     sub:'visits registered' },
    { icon:'₹',  iconClass:'gold',  number: _fmt(revenueToday), label:'Revenue Today', sub:'total collected' },
  ]);

  _renderActions([
    { icon:'⏳', label:'Approve Staff',   desc:'Review pending requests', href:'#',          id:'btn-approvals' },
    { icon:'🏥', label:'New Patient',     desc:'Register & add to queue', href:'reception.html' },
    { icon:'📊', label:'Reports',         desc:'Revenue & analytics',     href:'reports.html' },
    { icon:'💊', label:'Pharmacy',        desc:'Dispensary & stock',      href:'dispensaryPOS.html' },
  ]);

  document.getElementById('btn-approvals')?.addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('main-section').scrollIntoView({ behavior:'smooth' });
  });

  await _renderPendingApprovals();
}

// ════════════════════════════════════════════════════════════════
// DOCTOR
// ════════════════════════════════════════════════════════════════
async function _setupDoctor() {
  _setBannerAction('Open Queue', 'doctor.html');

  const [waiting, completed, totalVisits] = await Promise.all([
    _count('visits', [['tenant_id', tenantId], ['status','waiting']], true),
    _count('visits', [['tenant_id', tenantId], ['status','completed']], true),
    _count('visits', [['tenant_id', tenantId]]),
  ]);

  _renderStats([
    { icon:'⏳', iconClass:'red',   number: waiting,     label:'Waiting Now',        sub:'patients in queue' },
    { icon:'✅', iconClass:'green', number: completed,   label:'Seen Today',         sub:'consultations done' },
    { icon:'📋', iconClass:'blue',  number: totalVisits, label:'Total Visits',       sub:'all time in system' },
    { icon:'📝', iconClass:'gold',  number: '—',         label:'Prescriptions Today',sub:'coming soon' },
  ]);

  _renderActions([
    { icon:'🩺', label:'Patient Queue',   desc:'View & start consultation', href:'doctor.html' },
    { icon:'📋', label:'Consultation',    desc:'Open consultation room',    href:'consultation.html' },
    { icon:'💊', label:'Prescriptions',   desc:'View recent prescriptions', href:'consultation.html' },
    { icon:'📊', label:'Reports',         desc:'Patient analytics',         href:'reports.html' },
  ]);

  _renderWelcomeCard(
    '🩺',
    'Your patient queue is ready',
    'Patients registered at reception will appear in your queue. Click "Patient Queue" to begin your consultations.',
    'Open Queue', 'doctor.html'
  );
}

// ════════════════════════════════════════════════════════════════
// RECEPTIONIST / NURSE
// ════════════════════════════════════════════════════════════════
async function _setupReception() {
  _setBannerAction('Register Patient', 'reception.html');

  const [regToday, waiting, pendingBills, collected] = await Promise.all([
    _countToday('visits'),
    _count('visits', [['tenant_id', tenantId], ['status','waiting']]),
    _count('bills', [['tenant_id', tenantId], ['status','pending']]),
    _sumToday('bills', 'amount_paid'),
  ]);

  _renderStats([
    { icon:'🏥', iconClass:'green', number: regToday,     label:'Registered Today',   sub:'patients checked in' },
    { icon:'⏳', iconClass:'red',   number: waiting,      label:'Waiting Now',        sub:'in queue' },
    { icon:'📄', iconClass:'gold',  number: pendingBills, label:'Pending Bills',      sub:'awaiting payment' },
    { icon:'₹',  iconClass:'blue',  number: _fmt(collected), label:'Collected Today', sub:'total payments' },
  ]);

  _renderActions([
    { icon:'➕', label:'New Patient',    desc:'Register & add to queue', href:'reception.html' },
    { icon:'👁', label:'View Queue',     desc:'All waiting patients',    href:'doctor.html' },
    { icon:'📄', label:'Billing',        desc:'Create or view bills',    href:'reception.html' },
    { icon:'📊', label:'Today\'s Log',   desc:'All visits today',        href:'reports.html' },
  ]);

  _renderWelcomeCard(
    '🏥',
    'Reception is ready',
    'Register new patients, manage the OPD queue, and collect payments — all from one place.',
    'Register a Patient', 'reception.html'
  );
}

// ════════════════════════════════════════════════════════════════
// PHARMACIST
// ════════════════════════════════════════════════════════════════
async function _setupPharmacist() {
  _setBannerAction('Open POS', 'dispensaryPOS.html');

  const [lowStock, salesToday, purchases] = await Promise.all([
    _count('inventory', [['tenant_id', tenantId]], false, ['quantity', 'lte', 10]),
    _sumToday('bills', 'amount_paid'),
    _countToday('purchase_orders'),
  ]);

  _renderStats([
    { icon:'⚠️', iconClass:'red',   number: lowStock,          label:'Low Stock Items',   sub:'quantity ≤ 10' },
    { icon:'₹',  iconClass:'gold',  number: _fmt(salesToday),  label:'Sales Today',       sub:'pharmacy revenue' },
    { icon:'🚚', iconClass:'blue',  number: purchases,         label:'Purchases Today',   sub:'stock received' },
    { icon:'💊', iconClass:'green', number: '—',               label:'Dispensed Today',   sub:'coming soon' },
  ]);

  _renderActions([
    { icon:'🛒', label:'POS',          desc:'Dispense & billing',   href:'dispensaryPOS.html' },
    { icon:'🚚', label:'Purchase',     desc:'Receive new stock',     href:'purchase.html' },
    { icon:'📦', label:'Inventory',    desc:'Check stock levels',    href:'purchase.html' },
    { icon:'📊', label:'Reports',      desc:'Sales analytics',       href:'reports.html' },
  ]);

  _renderWelcomeCard(
    '💊',
    'Pharmacy is open',
    'Dispense medicines against prescriptions, manage your inventory, and record purchases.',
    'Open POS', 'dispensaryPOS.html'
  );
}

// ════════════════════════════════════════════════════════════════
// ACCOUNTANT
// ════════════════════════════════════════════════════════════════
async function _setupAccountant() {
  _setBannerAction('View Reports', 'reports.html');

  const [revenueToday, pendingBills, purchasesToday] = await Promise.all([
    _sumToday('bills', 'amount_paid'),
    _count('bills', [['tenant_id', tenantId], ['status','pending']]),
    _sumToday('purchase_orders', 'total_amount'),
  ]);

  _renderStats([
    { icon:'₹',  iconClass:'gold',  number: _fmt(revenueToday),   label:'Revenue Today',     sub:'total collected' },
    { icon:'📄', iconClass:'red',   number: pendingBills,         label:'Pending Bills',     sub:'awaiting payment' },
    { icon:'🚚', iconClass:'blue',  number: _fmt(purchasesToday), label:'Purchases Today',   sub:'total spent' },
    { icon:'📊', iconClass:'green', number: '—',                  label:'Net Today',         sub:'revenue − expenses' },
  ]);

  _renderActions([
    { icon:'📊', label:'Reports',     desc:'Full analytics',       href:'reports.html' },
    { icon:'🚚', label:'Purchases',   desc:'Purchase ledger',      href:'purchase.html' },
    { icon:'📄', label:'Billing',     desc:'Invoices & payments',  href:'reception.html' },
    { icon:'📋', label:'Statements',  desc:'Monthly summary',      href:'reports.html' },
  ]);

  _renderWelcomeCard(
    '📊',
    'Accounts overview',
    'Track daily revenue, manage purchase records, and generate financial reports.',
    'Open Reports', 'reports.html'
  );
}

// ════════════════════════════════════════════════════════════════
// LAB TECH
// ════════════════════════════════════════════════════════════════
async function _setupLabTech() {
  _setBannerAction('View Reports', 'reports.html');

  _renderStats([
    { icon:'🧪', iconClass:'blue',  number:'—', label:'Tests Today',    sub:'coming soon' },
    { icon:'✅', iconClass:'green', number:'—', label:'Completed',      sub:'coming soon' },
    { icon:'⏳', iconClass:'red',   number:'—', label:'Pending',        sub:'coming soon' },
    { icon:'📊', iconClass:'gold',  number:'—', label:'This Month',     sub:'coming soon' },
  ]);

  _renderActions([
    { icon:'📊', label:'Reports',   desc:'Lab results & analytics', href:'reports.html' },
  ]);

  _renderWelcomeCard(
    '🧪',
    'Lab module coming soon',
    'The full lab management module is under development. Use Reports to access any existing records.',
    'Open Reports', 'reports.html'
  );
}

// ════════════════════════════════════════════════════════════════
// STUDENT / DEFAULT
// ════════════════════════════════════════════════════════════════
async function _setupDefault() {
  _renderStats([
    { icon:'📚', iconClass:'blue',  number:'—', label:'Modules',   sub:'education hub' },
    { icon:'📝', iconClass:'green', number:'—', label:'Courses',   sub:'enrolled' },
    { icon:'✅', iconClass:'gold',  number:'—', label:'Completed', sub:'lessons' },
    { icon:'🏆', iconClass:'red',   number:'—', label:'Progress',  sub:'overall' },
  ]);

  _renderActions([
    { icon:'📚', label:'Study',    desc:'Course materials',  href:'#' },
    { icon:'📝', label:'Practice', desc:'Case studies',      href:'#' },
  ]);

  _renderWelcomeCard(
    '🌿',
    'Welcome to AyurXpert',
    'Your learning portal is being set up. Please contact your administrator if you need access to any module.',
    null, null
  );
}


// ════════════════════════════════════════════════════════════════
// PENDING APPROVALS (admin only)
// ════════════════════════════════════════════════════════════════
async function _renderPendingApprovals() {
  const approvals = await getPendingApprovals();

  const section = document.getElementById('main-section');
  section.innerHTML = `
    <div class="content-card">
      <div class="content-card-header">
        <span class="content-card-title">Pending Staff Approvals</span>
        <span class="badge-count ${approvals.length ? 'red' : ''}" id="approval-count">
          ${approvals.length}
        </span>
      </div>
      <div class="table-wrap" id="approvals-table-wrap">
        ${approvals.length ? _approvalsTableHTML(approvals) : _emptyStateHTML('⏳','All clear','No pending staff requests right now.')}
      </div>
    </div>
  `;

  _bindApprovalButtons();
}

function _approvalsTableHTML(rows) {
  return `
    <table>
      <thead>
        <tr>
          <th>Name</th><th>Role</th><th>Phone</th><th>Applied</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => `
          <tr id="row-${r.id}">
            <td><strong>${_esc(r.full_name || '—')}</strong></td>
            <td><span class="role-chip">${_roleLabel(r.role)}</span></td>
            <td>${_esc(r.phone || '—')}</td>
            <td>${_relativeDate(r.created_at)}</td>
            <td>
              <button class="btn-approve" data-id="${r.id}">Approve</button>
              <button class="btn-reject"  data-id="${r.id}">Reject</button>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

function _bindApprovalButtons() {
  document.querySelectorAll('.btn-approve').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      _setRowLoading(id, true);
      // Direct activate for MVP (bypasses dept step)
      const { error } = await supabase
        .from('profiles')
        .update({
          status:      'active',
          is_active:   true,
          approved_by: profile.id,
          approved_at: new Date().toISOString(),
        })
        .eq('id', id)
        .eq('tenant_id', tenantId);

      if (error) {
        _toast('Approval failed: ' + error.message, true);
        _setRowLoading(id, false);
      } else {
        _removeRow(id);
        _toast('Staff approved — they can now log in.');
        _updateApprovalBadge(-1);
      }
    });
  });

  document.querySelectorAll('.btn-reject').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.id;
      _setRowLoading(id, true);
      const { error } = await supabase
        .from('profiles')
        .update({
          status:      'rejected',
          approved_by: profile.id,
          approved_at: new Date().toISOString(),
        })
        .eq('id', id)
        .eq('tenant_id', tenantId);

      if (error) {
        _toast('Rejection failed: ' + error.message, true);
        _setRowLoading(id, false);
      } else {
        _removeRow(id);
        _toast('Staff request rejected.');
        _updateApprovalBadge(-1);
      }
    });
  });
}

function _setRowLoading(id, on) {
  const row = document.getElementById('row-' + id);
  if (!row) return;
  row.querySelectorAll('button').forEach(b => b.disabled = on);
}

function _removeRow(id) {
  const row = document.getElementById('row-' + id);
  if (!row) return;
  row.style.transition = 'opacity .3s';
  row.style.opacity = '0';
  setTimeout(() => {
    row.remove();
    const tbody = document.querySelector('#approvals-table-wrap tbody');
    if (tbody && !tbody.rows.length) {
      document.getElementById('approvals-table-wrap').innerHTML =
        _emptyStateHTML('✅','All done!','All staff requests have been processed.');
    }
  }, 320);
}

function _updateApprovalBadge(delta) {
  const el = document.getElementById('approval-count');
  if (!el) return;
  const n = Math.max(0, (parseInt(el.textContent) || 0) + delta);
  el.textContent = n;
  el.className = 'badge-count' + (n ? ' red' : '');
}


// ════════════════════════════════════════════════════════════════
// UI HELPERS
// ════════════════════════════════════════════════════════════════

function _setBannerAdmin() {
  const code = tenant?.tenant_code || '—';
  const el   = document.getElementById('banner-action');

    <div class="code-block">
      <div class="code-label">Organisation Code</div>

function _setBannerAction(label, href) {
  document.getElementById('banner-action').innerHTML =

function _renderStats(cards) {
  document.getElementById('stats-grid').innerHTML = cards.map(c => `
    <div class="stat-card">

        <div class="stat-icon ${c.iconClass}">${c.icon}</div>

      <div class="stat-number">${c.number ?? '—'}</div>

function _renderActions(actions) {
  document.getElementById('actions-grid').innerHTML = actions.map(a => {

    return `<a href="${a.href}" class="action-card" ${attrs}>

      <div class="action-desc">${a.desc}</div>

  }).join('');

function _renderWelcomeCard(icon, title, body, btnLabel, btnHref) {
  document.getElementById('main-section').innerHTML = `
    <div class="content-card">
      <div class="empty-state">
        <div class="empty-icon">${icon}</div>
        <div class="empty-title" style="font-size:17px">${title}</div>
        <div class="empty-body" style="max-width:360px;margin:8px auto 0">${body}</div>
        ${btnLabel ? `<a href="${btnHref}" class="btn-approve" style="display:inline-block;margin-top:20px;text-decoration:none">${btnLabel}</a>` : ''}
      </div>

}

function _emptyStateHTML(icon, title, body) {
  return `<div class="empty-state">
    <div class="empty-icon">${icon}</div>
    <div class="empty-title">${title}</div>
    <div class="empty-body">${body}</div>

}


// ════════════════════════════════════════════════════════════════
// SUPABASE QUERY HELPERS
// ════════════════════════════════════════════════════════════════
async function _count(table, filters = [], dateFilter = false, extraFilter = null) {
  try {
    let q = supabase.from(table).select('*', { count:'exact', head:true });
    filters.forEach(([col, val]) => { q = q.eq(col, val); });
    if (dateFilter) {
      q = q.gte('created_at', todayStart).lte('created_at', todayEnd);
    }
    if (extraFilter) {
      const [col, op, val] = extraFilter;
      if (op === 'lte') q = q.lte(col, val);
    }
    const { count } = await q;
    return count ?? 0;
  } catch { return 0; }
}

async function _countToday(table) {
  return _count(table, [['tenant_id', tenantId]], true);
}

async function _sumToday(table, col) {
  try {
    const { data } = await supabase
      .from(table)
      .select(col)
      .eq('tenant_id', tenantId)
      .gte('created_at', todayStart)
      .lte('created_at', todayEnd);
    return (data || []).reduce((s, r) => s + (Number(r[col]) || 0), 0);
  } catch { return 0; }
}


// ════════════════════════════════════════════════════════════════
// FORMATTING
// ════════════════════════════════════════════════════════════════
function _fmt(amount) {
  if (!amount) return '₹0';
  if (amount >= 100000) return '₹' + (amount / 100000).toFixed(1) + 'L';
  if (amount >= 1000)   return '₹' + (amount / 1000).toFixed(1) + 'K';
  return '₹' + Math.round(amount);
}

function _roleLabel(r) {
  return {
    super_admin:'Super Admin', dept_admin:'Dept. Admin', doctor:'Doctor',
    receptionist:'Receptionist', pharmacist:'Pharmacist', nurse:'Nurse',
    lab_tech:'Lab Technician', accountant:'Accountant', student:'Student',
  }[r] || r;
}

function _relativeDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const diff = Math.floor((Date.now() - d) / 60000);
  if (diff < 60)     return diff + 'm ago';
  if (diff < 1440)   return Math.floor(diff/60) + 'h ago';
  return Math.floor(diff/1440) + 'd ago';
}

function _esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function _toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isError ? '#7f1d1d' : '#1c2b1f';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
