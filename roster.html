<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Duty Roster — AyurXpert</title>
<link rel="stylesheet" href="css/global.css"/>
<style>
:root{--shift-morning:#e8f5ee;--shift-afternoon:#fff8e8;--shift-night:#f0e8ff;--shift-oncall:#e8f0ff;--gap:#fdecea}
.page-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.page-title{font-size:22px;font-weight:700;color:var(--green-deep);font-family:'Cormorant Garamond',serif}
.page-subtitle{font-size:13px;color:var(--text-muted);margin-top:2px}
.controls-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px}
.week-nav{display:flex;align-items:center;gap:8px}
.week-label{font-weight:600;font-size:13px;color:var(--green-deep);min-width:160px;text-align:center}
.btn-week{background:none;border:1.5px solid var(--border);border-radius:var(--radius);padding:0 10px;height:32px;cursor:pointer;font-size:14px;color:var(--green-deep)}
.btn-week:hover{background:var(--green-light)}
.gap-banner{display:none;margin-bottom:14px;padding:10px 16px;background:#fdecea;border:1.5px solid var(--red);border-radius:var(--radius);font-size:13px;color:#8b1a1a;font-weight:500}
.gap-banner.show{display:block}
.roster-table{width:100%;border-collapse:collapse;font-size:12px}
.roster-table th{background:var(--green-deep);color:#fff;padding:8px 10px;text-align:center;white-space:nowrap;font-weight:600;font-size:11px;position:sticky;top:0}
.roster-table th.shift-col{background:var(--green-mid);width:100px}
.roster-table td{padding:6px 8px;border:1px solid var(--border);vertical-align:middle;text-align:center}
.roster-table td.shift-label{background:var(--cream);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);white-space:nowrap}
.shift-cell{min-height:48px;cursor:pointer;border-radius:4px;transition:background .15s}
.shift-cell:hover{filter:brightness(.95)}
.shift-cell.morning{background:var(--shift-morning)}
.shift-cell.afternoon{background:var(--shift-afternoon)}
.shift-cell.night{background:var(--shift-night)}
.shift-cell.on_call{background:var(--shift-oncall)}
.shift-cell.gap{background:var(--gap) !important;border:1.5px dashed var(--red) !important}
.cell-name{font-weight:600;font-size:12px;color:var(--green-deep);display:block;line-height:1.3}
.cell-status{font-size:10px;color:var(--text-muted);margin-top:2px}
.cell-confirmed{font-size:10px;color:var(--green-mid);font-weight:500}
.cell-add{font-size:11px;color:var(--text-muted);font-style:italic}
.cell-gap-label{font-size:11px;color:var(--red);font-weight:600}
.today-col th,.today-col td{border-left:2px solid var(--green-mid)!important;border-right:2px solid var(--green-mid)!important}
.section-header{background:var(--green-light);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;margin:20px 0 12px;display:flex;justify-content:space-between;align-items:center}
.section-header-title{font-weight:700;font-size:14px;color:var(--green-deep)}
/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:12px;width:420px;max-width:94vw;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-header{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-title{font-weight:700;font-size:15px;color:var(--green-deep)}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);line-height:1}
.modal-body{padding:18px 20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.field{margin-bottom:12px}
.field label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);display:block;margin-bottom:4px}
.field select,.field input,.field textarea{width:100%;border:1.5px solid var(--border);border-radius:var(--radius);padding:8px 10px;font-size:13px;font-family:'DM Sans',sans-serif;background:#fff}
.shift-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase}
.shift-badge.morning{background:var(--shift-morning);color:var(--green-deep)}
.shift-badge.afternoon{background:var(--shift-afternoon);color:#7a5a00}
.shift-badge.night{background:var(--shift-night);color:#5a1a8b}
.shift-badge.on_call{background:var(--shift-oncall);color:#1a308b}
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;display:none}
.alert.show{display:block}
.alert.success{background:#e8f5ee;border:1px solid var(--green-mid);color:var(--green-deep)}
.alert.error{background:#fdecea;border:1px solid var(--red);color:#8b1a1a}
@media(max-width:700px){.roster-table{font-size:10px}.roster-table th,.roster-table td{padding:4px}}
</style>
</head>
<body>
<div id="navbar-root"></div>

<div class="container" style="max-width:1100px;padding-top:24px">

  <div class="page-header">
    <div>
      <div class="page-title">24×7 Duty Roster</div>
      <div class="page-subtitle">NCISM §51(5) — RMO / EMO / On-Call Consultant schedule with gap detection</div>
    </div>
    <button class="btn btn-primary btn-sm" id="btn-add-shift">+ Assign Shift</button>
  </div>

  <div id="alert" class="alert"></div>

  <!-- Controls -->
  <div class="controls-bar">
    <div class="week-nav">
      <button class="btn-week" id="btn-prev-week">&#8249;</button>
      <div class="week-label" id="week-label">Loading…</div>
      <button class="btn-week" id="btn-next-week">&#8250;</button>
    </div>
    <select id="filter-dept" style="min-width:200px;border:1.5px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-size:13px">
      <option value="">All Departments</option>
    </select>
    <button class="btn btn-secondary btn-sm" id="btn-today">Today</button>
  </div>

  <!-- Gap banner -->
  <div class="gap-banner" id="gap-banner"></div>

  <!-- Duty Roster Table -->
  <div class="section-header">
    <div class="section-header-title">🏥 Duty Roster — RMO / EMO / GDMO</div>
    <div style="font-size:11px;color:var(--text-muted)">Click any cell to assign or change the duty officer</div>
  </div>

  <div style="overflow-x:auto">
    <table class="roster-table" id="roster-table">
      <thead id="roster-thead"></thead>
      <tbody id="roster-tbody"></tbody>
    </table>
  </div>

  <!-- On-Call Specialty Roster -->
  <div class="section-header" style="margin-top:32px">
    <div class="section-header-title">📞 On-Call Specialty Consultant Roster</div>
    <div style="font-size:11px;color:var(--text-muted)">NCISM §18i — Specialist on-call coverage per department</div>
  </div>

  <div style="overflow-x:auto">
    <table class="roster-table" id="oncall-table">
      <thead id="oncall-thead"></thead>
      <tbody id="oncall-tbody"></tbody>
    </table>
  </div>

</div>

<!-- Assign Shift Modal -->
<div class="modal-overlay" id="shift-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Assign Shift</span>
      <button class="modal-close" onclick="closeModal()">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Department</label>
        <select id="m-dept"></select>
      </div>
      <div class="field">
        <label>Date</label>
        <input id="m-date" type="date"/>
      </div>
      <div class="field">
        <label>Shift</label>
        <select id="m-shift">
          <option value="morning">🌅 Morning (06:00 – 14:00)</option>
          <option value="afternoon">🌤 Afternoon (14:00 – 22:00)</option>
          <option value="night">🌙 Night (22:00 – 06:00)</option>
          <option value="on_call">📞 On-Call (24hr specialist)</option>
        </select>
      </div>
      <div class="field">
        <label>Officer / Doctor</label>
        <select id="m-doctor">
          <option value="">— Select —</option>
        </select>
      </div>
      <div class="field">
        <label class="check-label" style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="m-confirmed"/>
          <span>Mark as confirmed (doctor has acknowledged)</span>
        </label>
      </div>
      <div class="field">
        <label>Notes (optional)</label>
        <input id="m-notes" type="text" placeholder="e.g. covering for Dr. Sharma, holiday duty"/>
      </div>
      <div id="m-existing-info" style="display:none;padding:8px 12px;background:#fff8e8;border:1px solid #e8c060;border-radius:var(--radius);font-size:12px;color:#7a5a00;margin-top:4px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="btn-remove-shift" style="display:none;margin-right:auto" onclick="removeShift()">Remove</button>
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary btn-sm" id="btn-save-shift" onclick="saveShift()">Save Assignment</button>
    </div>
  </div>
</div>

<script type="module">
import { requireAuth, getCurrentTenantId, getCurrentProfile } from './js/core/auth.js';
import { initNavbar } from './js/components/navbar.js';
import { supabase } from './js/core/db/supabaseClient.js';

await requireAuth(['super_admin', 'dept_admin']);
initNavbar();

const tenantId = getCurrentTenantId();
const profile  = getCurrentProfile();

// ── State ──────────────────────────────────────────
let _weekStart  = _getMonday(new Date());
let _depts      = [];
let _doctors    = [];
let _roster     = [];     // duty_roster rows for current week
let _editEntry  = null;   // existing row being edited

const SHIFTS      = ['morning','afternoon','night'];
const SHIFT_LABELS = { morning:'Morning', afternoon:'Afternoon', night:'Night', on_call:'On-Call' };
const SHIFT_TIMES  = { morning:'06:00–14:00', afternoon:'14:00–22:00', night:'22:00–06:00', on_call:'24hr specialist' };

// ── Utilities ──────────────────────────────────────
function _getMonday(d) {
  const day = d.getDay();
  const diff = (day === 0 ? -6 : 1 - day);
  const m = new Date(d);
  m.setDate(m.getDate() + diff);
  m.setHours(0,0,0,0);
  return m;
}
function _dateStr(d) {
  return d.toISOString().split('T')[0];
}
function _fmtDate(d) {
  return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'});
}
function _fmtDay(d) {
  return new Date(d).toLocaleDateString('en-IN',{weekday:'short'});
}
function _isToday(d) {
  return _dateStr(new Date(d)) === _dateStr(new Date());
}
function _weekDates() {
  return Array.from({length:7}, (_,i) => {
    const d = new Date(_weekStart);
    d.setDate(d.getDate() + i);
    return _dateStr(d);
  });
}

// ── Load data ──────────────────────────────────────
async function loadDepartments() {
  const { data } = await supabase.from('departments')
    .select('id,name,ncism_code').eq('tenant_id', tenantId).eq('is_active',true).order('name');
  _depts = data || [];

  const fd = document.getElementById('filter-dept');
  const md = document.getElementById('m-dept');
  [fd, md].forEach(sel => {
    const preserve = sel.value;
    while(sel.options.length > (sel === fd ? 1 : 0)) sel.remove(sel.options.length-1);
    _depts.forEach(d => {
      const o = document.createElement('option');
      o.value = d.id;
      o.textContent = d.name + (d.ncism_code ? ` (${d.ncism_code})` : '');
      sel.appendChild(o);
    });
    if (preserve) sel.value = preserve;
  });
}

async function loadDoctors() {
  const { data } = await supabase.from('profiles')
    .select('id,full_name,role')
    .eq('tenant_id', tenantId)
    .in('role', ['doctor','nurse'])
    .eq('status','active')
    .order('full_name');
  _doctors = data || [];
  const sel = document.getElementById('m-doctor');
  while(sel.options.length > 1) sel.remove(1);
  _doctors.forEach(d => {
    const o = document.createElement('option');
    o.value = d.id;
    o.textContent = d.full_name + (d.role === 'nurse' ? ' (Nurse/RMO)' : '');
    sel.appendChild(o);
  });
}

async function loadRoster() {
  const dates = _weekDates();
  const deptFilter = document.getElementById('filter-dept').value;
  let q = supabase.from('duty_roster')
    .select('id,department_id,profile_id,shift_date,shift_type,is_confirmed,notes,profiles(full_name)')
    .eq('tenant_id', tenantId)
    .gte('shift_date', dates[0])
    .lte('shift_date', dates[6]);
  if (deptFilter) q = q.eq('department_id', deptFilter);
  const { data } = await q;
  _roster = data || [];
  renderRoster();
  renderOnCall();
  updateGapBanner();
}

// ── Render weekly roster ───────────────────────────
function renderRoster() {
  const dates = _weekDates();
  const deptFilter = document.getElementById('filter-dept').value;
  const depts = deptFilter ? _depts.filter(d => d.id === deptFilter) : _depts;

  // Header
  const thead = document.getElementById('roster-thead');
  thead.innerHTML = `<tr>
    <th class="shift-col">Shift</th>
    ${dates.map((d,i) => `<th class="${_isToday(d)?'today-col':''}">${_fmtDay(d)}<br><span style="font-weight:400;font-size:10px">${_fmtDate(d)}</span></th>`).join('')}
  </tr>`;

  // Body — one group of rows per dept
  const tbody = document.getElementById('roster-tbody');
  if (!depts.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text-muted)">No departments configured.</td></tr>'; return; }

  let html = '';
  depts.forEach(dept => {
    html += `<tr><td colspan="8" style="background:var(--green-light);color:var(--green-deep);font-weight:600;font-size:11px;padding:5px 10px;text-transform:uppercase;letter-spacing:.5px">${dept.name}</td></tr>`;
    SHIFTS.forEach(shift => {
      html += `<tr>
        <td class="shift-label"><span class="shift-badge ${shift}">${SHIFT_LABELS[shift]}</span><br><span style="font-size:9px">${SHIFT_TIMES[shift]}</span></td>
        ${dates.map(d => {
          const entry = _roster.find(r => r.department_id === dept.id && r.shift_date === d && r.shift_type === shift);
          return _cellHtml(dept.id, d, shift, entry);
        }).join('')}
      </tr>`;
    });
  });
  tbody.innerHTML = html;

  // Attach cell click handlers
  tbody.querySelectorAll('.shift-cell').forEach(cell => {
    cell.addEventListener('click', () => openModal(
      cell.dataset.dept, cell.dataset.date, cell.dataset.shift, cell.dataset.entryId || null
    ));
  });
}

function _cellHtml(deptId, date, shift, entry) {
  const today = _isToday(date);
  if (!entry) {
    return `<td class="${today?'today-col':''}">
      <div class="shift-cell gap ${shift}" data-dept="${deptId}" data-date="${date}" data-shift="${shift}">
        <span class="cell-gap-label">⚠ Unassigned</span>
      </div></td>`;
  }
  const name = entry.profiles?.full_name || '—';
  return `<td class="${today?'today-col':''}">
    <div class="shift-cell ${shift}" data-dept="${deptId}" data-date="${date}" data-shift="${shift}" data-entry-id="${entry.id}">
      <span class="cell-name">${name}</span>
      ${entry.is_confirmed ? '<span class="cell-confirmed">✓ Confirmed</span>' : '<span class="cell-status">Pending confirm</span>'}
      ${entry.notes ? `<span class="cell-status">${entry.notes}</span>` : ''}
    </div></td>`;
}

// ── On-Call roster ─────────────────────────────────
function renderOnCall() {
  const dates = _weekDates();
  const deptFilter = document.getElementById('filter-dept').value;
  const depts = deptFilter ? _depts.filter(d => d.id === deptFilter) : _depts;

  const thead = document.getElementById('oncall-thead');
  thead.innerHTML = `<tr>
    <th class="shift-col">Specialty Dept</th>
    ${dates.map(d => `<th class="${_isToday(d)?'today-col':''}">${_fmtDay(d)}<br><span style="font-weight:400;font-size:10px">${_fmtDate(d)}</span></th>`).join('')}
  </tr>`;

  const tbody = document.getElementById('oncall-tbody');
  if (!depts.length) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:24px;color:var(--text-muted)">No departments configured.</td></tr>'; return; }

  let html = '';
  depts.forEach(dept => {
    html += `<tr>
      <td class="shift-label"><span class="shift-badge on_call">${dept.ncism_code || '—'}</span><br><span style="font-size:10px;color:var(--text-mid)">${dept.name}</span></td>
      ${dates.map(d => {
        const entry = _roster.find(r => r.department_id === dept.id && r.shift_date === d && r.shift_type === 'on_call');
        return _cellHtml(dept.id, d, 'on_call', entry);
      }).join('')}
    </tr>`;
  });
  tbody.innerHTML = html;

  tbody.querySelectorAll('.shift-cell').forEach(cell => {
    cell.addEventListener('click', () => openModal(
      cell.dataset.dept, cell.dataset.date, cell.dataset.shift, cell.dataset.entryId || null
    ));
  });
}

// ── Gap detection ──────────────────────────────────
function updateGapBanner() {
  const dates = _weekDates();
  const deptFilter = document.getElementById('filter-dept').value;
  const depts = deptFilter ? _depts.filter(d => d.id === deptFilter) : _depts;
  let gaps = 0;
  depts.forEach(dept => {
    SHIFTS.forEach(shift => {
      dates.forEach(d => {
        const has = _roster.some(r => r.department_id === dept.id && r.shift_date === d && r.shift_type === shift);
        if (!has) gaps++;
      });
    });
  });
  const banner = document.getElementById('gap-banner');
  if (gaps > 0) {
    banner.textContent = `⚠ NCISM §51(5) compliance issue: ${gaps} shift${gaps>1?'s':''} unassigned this week — 24×7 coverage not met.`;
    banner.classList.add('show');
  } else {
    banner.textContent = '';
    banner.classList.remove('show');
  }
}

// ── Week navigation ────────────────────────────────
function updateWeekLabel() {
  const dates = _weekDates();
  document.getElementById('week-label').textContent =
    `${_fmtDate(dates[0])} – ${_fmtDate(dates[6])}`;
}

document.getElementById('btn-prev-week').addEventListener('click', () => {
  _weekStart.setDate(_weekStart.getDate() - 7); updateWeekLabel(); loadRoster();
});
document.getElementById('btn-next-week').addEventListener('click', () => {
  _weekStart.setDate(_weekStart.getDate() + 7); updateWeekLabel(); loadRoster();
});
document.getElementById('btn-today').addEventListener('click', () => {
  _weekStart = _getMonday(new Date()); updateWeekLabel(); loadRoster();
});
document.getElementById('filter-dept').addEventListener('change', loadRoster);
document.getElementById('btn-add-shift').addEventListener('click', () => openModal(null, _dateStr(new Date()), 'morning', null));

// ── Modal ──────────────────────────────────────────
function openModal(deptId, date, shift, entryId) {
  _editEntry = entryId ? _roster.find(r => r.id === entryId) : null;

  document.getElementById('m-dept').value  = deptId || '';
  document.getElementById('m-date').value  = date;
  document.getElementById('m-shift').value = shift;
  document.getElementById('m-doctor').value = _editEntry?.profile_id || '';
  document.getElementById('m-confirmed').checked = _editEntry?.is_confirmed || false;
  document.getElementById('m-notes').value = _editEntry?.notes || '';

  const removeBtn = document.getElementById('btn-remove-shift');
  removeBtn.style.display = _editEntry ? '' : 'none';

  const existingInfo = document.getElementById('m-existing-info');
  if (_editEntry) {
    existingInfo.style.display = '';
    existingInfo.textContent = `Currently assigned: ${_editEntry.profiles?.full_name || '—'} · Editing this slot.`;
  } else {
    existingInfo.style.display = 'none';
  }

  const deptName = _depts.find(d => d.id === deptId)?.name || '';
  document.getElementById('modal-title').textContent = `${_editEntry ? 'Edit' : 'Assign'} Shift — ${deptName ? deptName + ' · ' : ''}${_fmtDate(date)}`;
  document.getElementById('shift-modal').classList.add('show');
}

window.closeModal = function() {
  document.getElementById('shift-modal').classList.remove('show');
  _editEntry = null;
};

window.saveShift = async function() {
  const deptId   = document.getElementById('m-dept').value;
  const date     = document.getElementById('m-date').value;
  const shift    = document.getElementById('m-shift').value;
  const doctorId = document.getElementById('m-doctor').value;
  const confirmed= document.getElementById('m-confirmed').checked;
  const notes    = document.getElementById('m-notes').value.trim();

  if (!deptId)   { _alert('error','Select a department.'); return; }
  if (!date)     { _alert('error','Select a date.'); return; }
  if (!doctorId) { _alert('error','Select a doctor / officer.'); return; }

  const btn = document.getElementById('btn-save-shift');
  btn.disabled = true; btn.textContent = 'Saving…';

  const payload = {
    tenant_id: tenantId, department_id: deptId,
    profile_id: doctorId, shift_date: date,
    shift_type: shift, is_confirmed: confirmed,
    notes: notes || null,
  };

  let error;
  if (_editEntry) {
    ({ error } = await supabase.from('duty_roster').update(payload).eq('id', _editEntry.id));
  } else {
    ({ error } = await supabase.from('duty_roster').upsert(payload, { onConflict: 'tenant_id,department_id,shift_date,shift_type' }));
  }

  btn.disabled = false; btn.textContent = 'Save Assignment';

  if (error) { _alert('error', 'Failed: ' + error.message); return; }
  closeModal();
  _alert('success', 'Shift assigned.');
  await loadRoster();
};

window.removeShift = async function() {
  if (!_editEntry || !confirm('Remove this shift assignment?')) return;
  const { error } = await supabase.from('duty_roster').delete().eq('id', _editEntry.id);
  if (error) { _alert('error', 'Failed: ' + error.message); return; }
  closeModal();
  _alert('success', 'Shift removed.');
  await loadRoster();
};

// ── Alert ──────────────────────────────────────────
function _alert(type, msg) {
  const el = document.getElementById('alert');
  el.textContent = msg;
  el.className = `alert ${type} show`;
  setTimeout(() => el.className = 'alert', 4000);
}

// ── Boot ───────────────────────────────────────────
updateWeekLabel();
await Promise.all([loadDepartments(), loadDoctors()]);
await loadRoster();
</script>
</body>
</html>
