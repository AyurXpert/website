<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://abhasbx.abdm.gov.in https://phrsbx.abdm.gov.in https://healthid.abdm.gov.in https://cloudflareinsights.com https://static.cloudflareinsights.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com https://fonts.googleapis.com; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<title>Reset Password — AyurXpert</title>
<link rel="icon" href="assets/icon.svg"/>
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#1a4a2e"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green-deep:#1a4a2e;--green-mid:#2d7a4f;--green-light:#e8f5ee;
  --gold:#c9902a;--cream:#faf8f3;--white:#ffffff;
  --text-dark:#1c2b1f;--text-mid:#4a6352;--text-muted:#8a9e90;
  --border:#d4e6da;
  --error-bg:#fff3f3;--error-text:#8b1a1a;--error-border:#f5b8b8;
  --success-bg:#f0f9f4;--success-text:#1a4a2e;--success-border:#b8ddc6;
}
html,body{min-height:100%;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark)}

.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 16px 80px}

.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:28px;animation:fadeUp .5s ease both}
.logo-img{width:56px;height:56px;object-fit:contain;border-radius:12px}
.logo-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;color:var(--green-deep);letter-spacing:-.3px}

.card{
  width:100%;max-width:420px;background:var(--white);
  border-radius:20px;padding:36px 32px;
  box-shadow:0 4px 32px rgba(26,74,46,.10),0 1px 4px rgba(26,74,46,.06);
  animation:fadeUp .5s ease .1s both;
}
.card-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--green-deep);margin-bottom:6px;line-height:1.2}
.card-sub{font-size:14px;color:var(--text-muted);margin-bottom:28px;line-height:1.6}

.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:500;color:var(--text-mid);margin-bottom:6px}
.input-wrap{position:relative}
.field input{
  width:100%;height:48px;padding:0 16px;
  border:1.5px solid var(--border);border-radius:12px;
  font-family:'DM Sans',sans-serif;font-size:15px;color:var(--text-dark);
  background:var(--cream);outline:none;transition:border .2s,box-shadow .2s;
}
.field input:focus{border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(45,122,79,.10);background:#fff}
.field input.error{border-color:#f5b8b8;background:var(--error-bg)}
.toggle-pw{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;font-size:17px;color:var(--text-muted);
  padding:4px;line-height:1;
}

.btn-primary{
  width:100%;height:50px;background:var(--green-deep);color:#fff;
  border:none;border-radius:12px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;
  cursor:pointer;transition:background .2s,transform .1s;margin-top:4px;
}
.btn-primary:hover{background:#1f5c37}
.btn-primary:active{transform:scale(.98)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed}

.alert{border-radius:10px;padding:12px 14px;font-size:13.5px;line-height:1.55;margin-bottom:18px;display:none}
.alert.show{display:block}
.alert.error{background:var(--error-bg);color:var(--error-text);border:1px solid var(--error-border)}
.alert.success{background:var(--success-bg);color:var(--success-text);border:1px solid var(--success-border)}

.back-link{display:block;text-align:center;margin-top:22px;font-size:13px;color:var(--text-muted)}
.back-link a{color:var(--green-mid);text-decoration:none;font-weight:500}
.back-link a:hover{color:var(--gold)}

.strength-bar{height:4px;border-radius:4px;background:#e5e7eb;margin-top:8px;overflow:hidden}
.strength-fill{height:100%;border-radius:4px;width:0;transition:width .3s,background .3s}

.pw-hint{font-size:12px;color:var(--text-muted);margin-top:6px}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:480px){
  .card{padding:28px 20px;border-radius:16px}
  .card-title{font-size:22px}
}
</style>
</head>
<body>
<div class="page">

  <div class="logo-wrap">
    <img src="assets/AyurXpert_Navbar_Logo.png" alt="AyurXpert" class="logo-img" id="navbar-logo"/>
    <span class="logo-name">AyurXpert</span>
  </div>

  <!-- STEP 1: Request reset link -->
  <div class="card" id="step-request">
    <div class="card-title">Forgot Password?</div>
    <div class="card-sub">Enter your registered email address. We'll send you a link to reset your password.</div>

    <div id="alert-request" class="alert"></div>

    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>

    <button class="btn-primary" id="btn-send" data-onclick="sendReset">Send Reset Link</button>

    <p class="back-link">Remembered it? <a href="login.html">Back to Sign In</a></p>
  </div>

  <!-- STEP 2: Set new password (shown when redirected back with recovery token) -->
  <div class="card" id="step-reset" style="display:none">
    <div class="card-title">Set New Password</div>
    <div class="card-sub">Choose a strong password for your account.</div>

    <div id="alert-reset" class="alert"></div>

    <div class="field">
      <label for="new-password">New Password</label>
      <div class="input-wrap">
        <input type="password" id="new-password" placeholder="Minimum 8 characters"
               autocomplete="new-password" data-oninput="checkStrength" data-oninput-a0="@value"/>
        <button class="toggle-pw" type="button" data-onclick="togglePw" data-onclick-a0="new-password" data-onclick-a1="@this" aria-label="Show password">&#128065;</button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
      <div class="pw-hint" id="strength-label"></div>
    </div>

    <div class="field">
      <label for="confirm-password">Confirm Password</label>
      <div class="input-wrap">
        <input type="password" id="confirm-password" placeholder="Repeat your new password"
               autocomplete="new-password"/>
        <button class="toggle-pw" type="button" data-onclick="togglePw" data-onclick-a0="confirm-password" data-onclick-a1="@this" aria-label="Show password">&#128065;</button>
      </div>
    </div>

    <button class="btn-primary" id="btn-update" data-onclick="updatePassword">Update Password</button>

    <p class="back-link"><a href="login.html">Back to Sign In</a></p>
  </div>

</div>

<script type="module" src="js/pages/forgot-password.js"></script>
</body>
</html>
