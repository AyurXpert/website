<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://cdn.jsdelivr.net https://static.cloudflareinsights.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https://*.supabase.co; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://cloudflareinsights.com https://static.cloudflareinsights.com; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; manifest-src 'self'; worker-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"/>
<title>Kshara Sutra Scheduler — AyurXpert</title>
<link rel="icon" href="assets/icon.svg"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap"/>
<style>
:root{
  --green-deep:#1a4a2e;--green-mid:#2d7a4f;--green-light:#e8f5ee;
  --gold:#c9902a;--gold-light:#fdf6e3;
  --red:#c0392b;--red-light:#fdecea;
  --cream:#faf8f3;--white:#fff;
  --border:#d8e4dd;--radius:8px;
  --text-dark:#1a2e22;--text-mid:#3d5a47;--text-muted:#7a9485;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text-dark);min-height:100vh}
.page-wrap{max-width:1200px;margin:0 auto;padding:28px 20px 80px}

/* Header */
.page-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;gap:12px;flex-wrap:wrap}
.page-title{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:var(--green-deep)}
.page-subtitle{font-size:13px;color:var(--text-muted);margin-top:3px}
.ncism-badge{display:inline-block;background:var(--gold);color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;letter-spacing:.4px;margin-left:8px;vertical-align:middle}

/* Buttons */
.btn{height:40px;padding:0 18px;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border:none;transition:background .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--green-deep);color:#fff}.btn-primary:hover{background:#1f5c37}
.btn-secondary{background:var(--white);color:var(--green-deep);border:1.5px solid var(--green-deep)}.btn-secondary:hover{background:var(--green-light)}
.btn-sm{height:32px;padding:0 12px;font-size:12px}
.btn-ghost{background:none;border:none;color:var(--text-mid);cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;padding:0 8px;height:30px;border-radius:6px}
.btn-ghost:hover{background:var(--green-light);color:var(--green-deep)}

/* Alert */
.alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;display:none}
.alert.show{display:block}
.alert.success{background:var(--green-light);color:var(--green-deep);border:1px solid #b2d8bf}
.alert.error{background:var(--red-light);color:#8b1a1a;border:1px solid #f5c6c6}

/* Stats */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px}
.stat-value{font-size:28px;font-weight:700;color:var(--green-deep);line-height:1}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:5px;text-transform:uppercase;letter-spacing:.4px}
.stat-card.gold .stat-value{color:var(--gold)}
.stat-card.red .stat-value{color:var(--red)}

/* Filter bar */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.tab-btns{display:flex;gap:4px;background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:3px}
.tab-btn{height:32px;padding:0 14px;border:none;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:none;color:var(--text-mid);transition:background .15s}
.tab-btn.active{background:var(--green-deep);color:#fff}
.search-input{height:38px;border:1.5px solid var(--border);border-radius:var(--radius);padding:0 12px;font-family:'DM Sans',sans-serif;font-size:13px;min-width:220px;background:var(--white)}
.search-input:focus{outline:none;border-color:var(--green-mid)}

/* Patient cards grid */
.ks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.ks-card{background:var(--white);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;position:relative}
.ks-card.overdue{border-left:4px solid var(--red)}
.ks-card.due-today{border-left:4px solid var(--gold)}
.ks-card.upcoming{border-left:4px solid var(--green-mid)}
.ks-card.completed{border-left:4px solid #94a3b8;opacity:.75}
.ks-card-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.ks-pt-name{font-weight:600;font-size:14px;color:var(--text-dark)}
.ks-pt-uhid{font-size:11px;color:var(--text-muted)}
.ks-condition{display:inline-block;background:var(--green-light);color:var(--green-deep);font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;text-transform:capitalize}
.ks-meta{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:10px 0;font-size:12px}
.ks-meta-item{display:flex;flex-direction:column;gap:2px}
.ks-meta-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.3px}
.ks-meta-value{font-weight:500;color:var(--text-dark)}
.ks-progress{margin:10px 0}
.ks-progress-bar{height:6px;background:#e8f0ec;border-radius:3px;overflow:hidden}
.ks-progress-fill{height:100%;background:var(--green-mid);border-radius:3px;transition:width .3s}
.ks-progress-label{font-size:10px;color:var(--text-muted);margin-top:3px}
.next-date-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600}
.next-date-chip.overdue{background:#fdecea;color:var(--red)}
.next-date-chip.today{background:var(--gold-light);color:#7a5c00}
.next-date-chip.upcoming{background:var(--green-light);color:var(--green-deep)}
.next-date-chip.none{background:#f1f5f9;color:#64748b}
.ks-card-actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:16px;font-weight:600;color:var(--text-mid);margin-bottom:6px}
.empty-desc{font-size:13px}

/* ── Overlay / Modal ── */
.ks-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:600;display:flex;align-items:center;justify-content:center;padding:16px}
.ks-modal{background:#fff;border-radius:12px;width:520px;max-width:100%;max-height:92vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.2);overflow:hidden}
.ks-modal-lg{width:700px}
.ks-modal-hdr{background:var(--green-deep);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.ks-modal-hdr-title{font-weight:600;font-size:15px}
.ks-modal-hdr-sub{font-size:11px;opacity:.7;margin-top:1px}
.ks-modal-close{background:none;border:none;color:#fff;font-size:20px;cursor:pointer;line-height:1;padding:0 0 0 12px}
.ks-modal-body{padding:20px;overflow-y:auto;flex:1}
.ks-modal-foot{padding:12px 20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border);flex-shrink:0}

/* Form fields inside modal */
.mfield{margin-bottom:14px}
.mfield label{font-size:12px;font-weight:600;color:var(--text-mid);display:block;margin-bottom:4px}
.mfield input,.mfield select,.mfield textarea{width:100%;height:38px;border:1.5px solid var(--border);border-radius:8px;padding:0 10px;font-size:13px;font-family:'DM Sans',sans-serif;box-sizing:border-box}
.mfield textarea{height:70px;padding:8px 10px;resize:vertical}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{outline:none;border-color:var(--green-mid)}
.mrow2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Patient search result */
.pt-result{background:var(--green-light);border:1.5px solid #b2d8bf;border-radius:8px;padding:10px 14px;margin-top:6px;display:none}
.pt-result.show{display:block}
.pt-result-name{font-weight:600;font-size:14px;color:var(--green-deep)}
.pt-result-sub{font-size:12px;color:var(--text-mid);margin-top:2px}

/* History table */
.hist-table{width:100%;border-collapse:collapse;font-size:13px}
.hist-table th{background:var(--green-light);color:var(--text-mid);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;text-align:left;border-bottom:1.5px solid var(--border)}
.hist-table td{padding:9px 10px;border-bottom:1px solid #eef2ef;color:var(--text-dark)}
.hist-table tr:last-child td{border-bottom:none}
.hist-table tr:hover td{background:#f8faf9}

@media(max-width:600px){
  .stats-row{grid-template-columns:1fr 1fr}
  .ks-grid{grid-template-columns:1fr}
  .mrow2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div id="navbar-placeholder"></div>

<div class="page-wrap">
  <div class="page-header">
    <div>
      <div class="page-title">Kshara Sutra Scheduler <span class="ncism-badge">NCISM §18o</span></div>
      <div class="page-subtitle">Shalya Tantra — Weekly thread change tracking & appointment scheduler</div>
    </div>
    <button class="btn btn-primary" data-onclick="openRegisterModal">+ Register New Case</button>
  </div>

  <div id="alert-box" class="alert"></div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-value" id="st-active">—</div><div class="stat-label">Active Cases</div></div>
    <div class="stat-card gold"><div class="stat-value" id="st-today">—</div><div class="stat-label">Due Today</div></div>
    <div class="stat-card red"><div class="stat-value" id="st-overdue">—</div><div class="stat-label">Overdue</div></div>
    <div class="stat-card"><div class="stat-value" id="st-completed">—</div><div class="stat-label">Completed</div></div>
  </div>

  <!-- Filters -->
  <div class="filter-bar">
    <div class="tab-btns">
      <button class="tab-btn active" data-onclick="setFilter" data-onclick-a0="active" data-onclick-a1="@this">Active</button>
      <button class="tab-btn" data-onclick="setFilter" data-onclick-a0="due_today" data-onclick-a1="@this">Due Today</button>
      <button class="tab-btn" data-onclick="setFilter" data-onclick-a0="overdue" data-onclick-a1="@this">Overdue</button>
      <button class="tab-btn" data-onclick="setFilter" data-onclick-a0="completed" data-onclick-a1="@this">Completed</button>
      <button class="tab-btn" data-onclick="setFilter" data-onclick-a0="all" data-onclick-a1="@this">All</button>
    </div>
    <input class="search-input" id="ks-search" type="text" placeholder="Search patient name…" data-oninput="renderCards"/>
  </div>

  <!-- Cards -->
  <div class="ks-grid" id="ks-grid"></div>
</div>

<!-- ── Register New KS Case Modal ── -->
<div class="ks-overlay" id="reg-overlay" style="display:none" data-onclick="_closeIfSelf" data-onclick-a0="@isTarget" data-onclick-a1="closeRegModal">
  <div class="ks-modal">
    <div class="ks-modal-hdr">
      <div><div class="ks-modal-hdr-title">Register New Kshara Sutra Case</div><div class="ks-modal-hdr-sub">Shalya Tantra · §18o</div></div>
      <button class="ks-modal-close" data-onclick="closeRegModal">✕</button>
    </div>
    <div class="ks-modal-body">
      <div class="mfield">
        <label>Patient Phone / Name Search</label>
        <input id="reg-search" type="text" placeholder="Enter phone number or name…" data-oninput="searchPatient"/>
        <div class="pt-result" id="reg-pt-result">
          <div class="pt-result-name" id="reg-pt-name">—</div>
          <div class="pt-result-sub" id="reg-pt-sub">—</div>
        </div>
      </div>
      <div class="mrow2">
        <div class="mfield">
          <label>Condition</label>
          <select id="reg-condition">
            <option value="">— Select —</option>
            <option value="fistula_in_ano">Fistula-in-Ano (Bhagandara)</option>
            <option value="haemorrhoids">Haemorrhoids (Arshas)</option>
            <option value="fissure">Fissure-in-Ano (Parikartika)</option>
            <option value="pilonidal_sinus">Pilonidal Sinus</option>
            <option value="sentinel_tag">Sentinel Tag</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="mfield">
          <label>Thread Type</label>
          <select id="reg-thread-type">
            <option value="apamarga">Apamarga Kshara</option>
            <option value="snuhi">Snuhi Kshara</option>
            <option value="combination">Combination</option>
            <option value="other">Other</option>
          </select>
        </div>
      </div>
      <div class="mrow2">
        <div class="mfield">
          <label>Start Date</label>
          <input id="reg-start-date" type="date"/>
        </div>
        <div class="mfield">
          <label>Planned Sittings</label>
          <input id="reg-planned" type="number" min="1" max="52" placeholder="e.g. 8"/>
        </div>
      </div>
      <div class="mfield">
        <label>Initial Assessment / Notes</label>
        <textarea id="reg-notes" placeholder="Thread size, track details, initial examination findings…"></textarea>
      </div>
    </div>
    <div class="ks-modal-foot">
      <button class="btn btn-secondary btn-sm" data-onclick="closeRegModal">Cancel</button>
      <button class="btn btn-primary btn-sm" data-onclick="saveKsCase">Register Case</button>
    </div>
  </div>
</div>

<!-- ── Log Thread Change Modal ── -->
<div class="ks-overlay" id="log-overlay" style="display:none" data-onclick="_closeIfSelf" data-onclick-a0="@isTarget" data-onclick-a1="closeLogModal">
  <div class="ks-modal">
    <div class="ks-modal-hdr">
      <div><div class="ks-modal-hdr-title" id="log-modal-title">Log Thread Change</div><div class="ks-modal-hdr-sub" id="log-modal-sub">Sitting #—</div></div>
      <button class="ks-modal-close" data-onclick="closeLogModal">✕</button>
    </div>
    <div class="ks-modal-body">
      <div class="mrow2">
        <div class="mfield">
          <label>Sitting Number</label>
          <input id="log-sitting-no" type="number" min="1" readonly style="background:#f5f5f5"/>
        </div>
        <div class="mfield">
          <label>Change Date</label>
          <input id="log-date" type="date"/>
        </div>
      </div>
      <div class="mrow2">
        <div class="mfield">
          <label>Thread Length Remaining (cm)</label>
          <input id="log-thread-len" type="number" step="0.1" min="0" placeholder="e.g. 4.5"/>
        </div>
        <div class="mfield">
          <label>Next Appointment Date</label>
          <input id="log-next-date" type="date"/>
        </div>
      </div>
      <div class="mfield">
        <label>Findings / Observations</label>
        <textarea id="log-findings" placeholder="Wound condition, discharge, patient complaints, thread tension…"></textarea>
      </div>
    </div>
    <div class="ks-modal-foot">
      <button class="btn btn-secondary btn-sm" data-onclick="closeLogModal">Cancel</button>
      <button class="btn btn-primary btn-sm" data-onclick="saveThreadChange">Save Change</button>
    </div>
  </div>
</div>

<!-- ── Session History Modal ── -->
<div class="ks-overlay" id="hist-overlay" style="display:none" data-onclick="_closeIfSelf" data-onclick-a0="@isTarget" data-onclick-a1="closeHistModal">
  <div class="ks-modal ks-modal-lg">
    <div class="ks-modal-hdr">
      <div><div class="ks-modal-hdr-title" id="hist-modal-title">Session History</div><div class="ks-modal-hdr-sub" id="hist-modal-sub">—</div></div>
      <button class="ks-modal-close" data-onclick="closeHistModal">✕</button>
    </div>
    <div class="ks-modal-body">
      <div id="hist-table-wrap"></div>
    </div>
    <div class="ks-modal-foot">
      <button class="btn btn-secondary btn-sm" data-onclick="closeHistModal">Close</button>
    </div>
  </div>
</div>

<script type="module" src="js/pages/ksharasutra.js"></script>
</body>
</html>
